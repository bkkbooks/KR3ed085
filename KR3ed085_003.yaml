body:
  text: 卷二太陽方葛根湯治太陽病項背𠘧𠘧無汗惡風者又治太陽與陽明合病必自下利此方主之葛根四兩麻黃三兩去節甘草二兩炙芍藥二兩桂枝二兩生薑三兩大棗十二枚上七味㕮咀以水一斗先煮葛根麻黃減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗不須啜粥余如桂枝法將息及禁忌歌曰四兩葛根三兩麻棗枚十二效堪嘉桂甘芍二薑三兩無汗憎風項背𠘧𠘧太陽病下利太陽陽明合病誇蔚按第二方桂枝加葛根湯與此湯俱治太陽經輸之病太陽之經輸在背經云邪入於輸腰脊乃強師於二方皆云治項背𠘧𠘧𠘧𠘧者小鳥羽短欲飛不能飛而伸頸之象也但前方治汗出是邪從肌腠而入輸故主桂枝此方治無汗是邪從膚表而入輸故主麻黃然邪既入輸肌腠亦病方中取桂枝湯全方加葛根麻黃亦肌表兩解之治與桂枝二麻黃一湯同意而用卻不同微乎微乎葛根性用解見第二方張令韶曰太陽與陽明合病必自下利者太陽主開陽明主闔今太陽合於陽明不從太陽之開而從陽明之闔病闔反開故必自下利下利者氣下而不上也葛根之性延蔓上騰氣騰於上利自止矣葛根加半夏湯治太陽與陽明合病不下利但嘔者此方主之葛根湯原方加半夏半升洗煎服同前歌曰二陽太陽與陽明合病下利葛根誇不利旋看嘔逆嗟須取原方照分兩半升半夏洗來加張令韶曰不下利但嘔者太陽之氣仍欲上達而從開也因其勢而開之故加半夏以宣通逆氣葛根黃芩黃連湯治太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者此湯主之葛根半斤甘草二兩黃芩二兩黃連二兩上四味以水八升先煮葛根減二升納諸藥煮取二升去滓分溫再服歌曰二兩連芩二兩甘葛根八兩論中談喘而汗出脈兼促誤下風邪利不堪一本黃連三兩蔚按太陽桂枝證而反下之邪由肌腠而內陷於中土故下利不止脈促與喘汗者內陷之邪欲從肌腠外出而不能出湧於脈道如疾行而蹶為脈促湧於華蓋肺主氣而上喘肺主皮毛而汗出方主葛根從里以達於表從下以騰於上輔以芩連之苦苦以堅之堅毛竅而止汗堅腸胃以止瀉又輔以甘草之甘妙得苦甘相合與人參同味而同功所以補中土而調脈道真神方也許宏方議云此方亦能治陽明大熱下利者又能治嗜酒之人熱喘者取用不窮也蔚按金桂峰之女患痢身熱如焚法在不治余斷其身熱為表邪用人參敗毒散繼服此方全愈益信長沙方之取用不窮也麻黃湯治太陽病頭疼發熱身疼腰痛骨節疼痛惡寒無汗而喘者此方主之麻黃三兩去節桂枝二兩去皮杏仁七十個去皮尖甘草一兩炙上四味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗不須啜粥余如桂枝法將息按今醫不讀神農本草經耳食庸醫唾餘謂麻黃難用而不知氣味輕清視羌獨荊防薑蔥較見純粹學者不可信俗方而疑經方也歌曰七十杏仁三兩麻一甘二桂效堪誇喘而無汗頭身痛溫覆休教粥到牙蔚按以上俱言桂枝證至此方言麻黃證也方下所列各證皆兼經氣而言何謂經內經云太陽之脈上連風府上頭項挾脊抵腰至足循身之背是也何謂氣內經云太陽之上寒氣主之又云三焦膀胱者腠理毫毛其應是太陽之氣主周身之表而主外也桂枝證病在肌腠肌腠實則膚表虛故以自汗為提綱此證病在膚表邪在膚表則膚表實故以無汗為提綱無汗則表氣不通故喘痛而曰疼痛之甚也此經與氣並傷視桂枝證較重故以麻黃大開皮毛為君以杏仁利氣甘草和中桂枝從肌以達表為輔佐覆取似汗而不啜粥恐其逗留麻黃之性發汗太過也大青龍湯治太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者此方主之麻黃六兩去節桂枝二兩去皮甘草二兩炙杏仁五十枚一本四十枚石膏如雞子大碎生薑三兩大棗十二枚上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微似汗汗出多者溫粉撲之一服汗者停後服從張氏節去三句歌曰二兩桂甘三兩薑膏如雞子六麻黃棗枚十二五十杏無汗煩而且躁方一本杏仁四十枚甘草三兩許宏方議云溫粉者只用白朮藁本川芎白芷各一兩米粉三兩為細末撲其身則汗止蔚按太陽底面便是少陰少陰證本無汗而煩躁證少陰與太陽俱有之若太陽中風脈浮為肌病有欲汗之勢緊為表實仍不得有汗是肌與表兼病也發熱為太陽之標病惡寒為太陽之本病是標與本俱病也太陽之氣主周身之毫毛太陽之經挾脊抵腰身疼痛是經與氣並病也風為陽邪病甚而汗不出陽邪內擾不可認為少陰之煩躁以致議溫有四逆湯議寒有黃連阿膠湯之誤只用麻黃湯以發表桂枝湯以解肌而標本經氣之治法俱在其中去芍藥者惡其苦降恐引邪陷入少陰也加石膏者取其質重性寒紋理似肌辛甘發散能使汗為熱隔之證透達而解如龍能行雲而致雨也更妙在倍用麻黃挾石膏之寒盡行於外而發汗不留於內而寒中方之所以入神也下節言脈即不緊而緩身即不疼而但重且有輕時雖不若上節之甚而無汗與煩躁審非少陰證亦可以此湯發之論云無少陰證者此者字承上節不汗出而煩躁言也小青龍湯治傷寒表不解心下有水氣乾嘔發熱而渴或咳或利或噎或小便不利少腹滿或喘此方主之麻黃三兩芍藥三兩細辛三兩乾薑三兩甘草三兩桂枝三兩半夏半升五味子半升上八味以水一斗先煮麻黃減二升去上沫納諸藥煮取三升去滓溫服一升若微利者去麻黃加蕘花如雞子大熬令赤色若渴者去半夏加栝蔞根三兩若噎者去麻黃加附子一枚炮若小便不利小腹滿去麻黃加茯苓四兩若喘者去麻黃加杏仁半升歌曰桂麻薑芍草辛三夏味半升記要諳表不解兮心下水咳而發熱句中探柯韻伯云心下為火位水火相射則水氣之變幻不可拘如上而不下則或噎或喘下而不上則或渴或利留於腸胃則小便不利而小腹因滿矣惟發熱而咳是為水證加減歌曰若渴去夏取蔞根三兩加來功亦壯微利去麻加蕘花吳云此味不常用以茯苓代之熬赤取如雞子樣若噎去麻炮附加只用一枚功莫上麻去再加四兩苓能除尿短小腹脹若喘除麻加杏仁須去皮尖半升量蔚按此傷寒太陽之表不解而動其里水也麻桂從太陽以祛表邪細辛入少陰而行里水乾薑散胸前之滿半夏降上逆之氣合五味之酸芍藥之苦取酸苦湧泄而下行既欲下行而仍用甘草以緩之者令藥性不暴則藥力周到能入邪氣水飲互結之處而攻之凡無形之邪氣從肌表出有形之水飲從水道出而邪氣水飲一併廓清矣喻嘉言云方名小青龍者取其翻波逐浪以歸江海不欲其興云升天而為淫雨之意若泥麻黃過散減去不用則不成其為龍將何恃以翻波逐浪乎桂枝加厚朴杏仁湯治太陽病下之微喘者表未解也桂枝三兩甘草二兩芍藥三兩大棗十二枚杏仁五十枚厚朴二兩炙去皮生薑三兩切上七味以水七升微火煮取三升去滓溫服一升覆取微似汗歌曰下後喘生桂枝證下之微喘及喘家素有喘名喘家桂枝湯外更須加朴加二兩五十杏此法微茫未有涯參太陽病有在表在外之不同以皮膚為表肌腠為外也太陽表病未解而下之氣不因下內陷而仍在於表不能宣發而微喘用桂枝湯從肌而托之於表加厚朴以寬之杏仁以降之表解而喘平矣與太陽病下之後其氣上衝者可與桂枝湯參看乾薑附子湯治下之後復發汗晝日煩躁不得眠夜安靜不渴不嘔無表證脈沉微身無大熱者此方主之乾薑一兩附子一枚生用去皮破八片上二味以水五升煮取一升去滓頓服歌曰生附一枚一兩薑晝間煩躁夜安常脈微無表身無熱幸藉殘陽未盡亡蔚按太陽底面便是少陰太陽證誤下之則少陰之陽既虛又發其汗則一線之陽難以自主陽王於晝陽虛欲援同氣之救助而不可得故煩躁不得眠陰王於夜陽虛必俯首不敢爭故夜則安靜又申之曰不嘔不渴脈沉微無表證身無大熱辨其煩躁之絶非外邪而為少陰陽虛之的證也證既的則以回陽之薑附頓服何疑桂枝加芍藥生薑人參新加湯治發汗後身疼痛脈沉遲者桂枝三兩芍藥四兩甘草二兩炙人參三兩大棗十二枚生薑四兩上六味以水一斗二升微火煮取三升去滓分溫服一升余如桂枝湯法按內臺云白水煎通口服不必取汗此説可存歌曰汗後身疼脈反沉新加方法軼醫林方中薑芍還增一三兩人參義蘊深蔚按此言太陽證發汗後邪已淨而營虛也身疼痛證雖似外邪而血虛不能養營者必痛也師恐人之誤認為邪故復申之曰脈沉遲以脈沉者病不在表遲者血虛無以榮脈也方用桂枝湯取其專行營分加人參以滋補血液生始之源加生薑以通血脈循行之滯加芍藥之苦平欲領薑桂之辛不走於肌腠而作汗潛行於經脈而定痛也曰新加者言邪盛忌用人參今因邪淨而新加之注家謂有餘邪者誤也麻黃杏仁甘草石膏湯治發汗後不可更行桂枝湯若汗出而喘無大熱者此湯主之下後同麻黃四兩去節杏仁五十枚甘草二兩炙石膏半斤上四味以水七升先煮麻黃去上沫納諸藥煮取二升去滓溫服一升歌曰四兩麻黃八兩膏二甘五十杏同熬須知禁桂為陽盛喘汗全憑熱勢操男元犀按此借治風溫之病論曰太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名風溫一節未出其方此處補之其文略異其實互相發明不然汗後病不解正宜桂枝湯曰不可更行者知陽盛於內也汗出而喘者陽盛於內火氣外越而汗出火氣上越而喘也其云無大熱奈何前論溫病曰發熱而渴不惡寒者邪從內出得太陽之標熱無太陽之本寒也今曰無大熱邪已蘊釀成熱熱盛於內以外熱較之而轉輕也讀書要得間不可死於句下至於方解柯韻伯最妙宜熟讀之柯韻伯云此方為溫病之主劑凡冬不藏精之人熱邪伏於臟腑至春風解凍伏邪自內而出法當乘其勢而汗之熱隨汗解矣此證頭項強痛與傷寒盡同惟不惡寒而渴以別之證繫有熱無寒故於麻黃湯去桂易石膏以解表裡俱熱之證岐伯所云末滿三日可汗而已者此法是也此病得於寒時而發於風令故又名曰風溫其脈陰陽俱浮其證自汗身重蓋陽浮則強於衛外而閉氣故身重當用麻黃開表以逐邪陰浮不能藏精而汗出當用石膏鎮陰以清火表裡俱熱則中氣不運升降不得自如故多眠鼻鼾語言難出當用杏仁甘草以調氣此方備升降輕重之性足以當之若攻下火熏等法此粗工促病之術也蓋內蘊之火邪與外感之餘熱治不同法是方溫病初起可用以解表清裡汗後可復用以平內熱之猖狂下後可復用以徹伏邪之留戀與風寒不解用桂枝湯同法例云桂枝下咽陽盛則斃特開此涼解一法為大青龍湯之變局白虎湯之先著也然此證但熱無寒用青龍則不宜薑桂恐脈流薄疾斑黃狂亂作矣此證但熱不虛用白虎則不宜參米恐食入於陰則長氣於陽譫語腹脹矣此為解表之劑若無喘鼾語言難出等證則又白虎之證治矣凡治溫病表裡之實用此湯治溫病表裡之虛用白虎加參米相須相濟者也若葛根黃芩黃連湯則治痢而不治喘要知溫病下後無利不止證葛根黃連之燥非治溫藥且麻黃專於外達與葛根之和中發表不同石膏甘潤與黃連之苦燥懸殊同是涼解表裡同是汗出而喘而用藥有毫釐之辨矣桂枝甘草湯治發汗過多其人叉手自冒心心下悸欲得按者此方主之桂枝四兩甘草二兩炙上二味以水三升煮取一升去滓頓服歌曰桂枝炙草取甘溫四桂二甘藥不煩叉手冒心虛已極汗多亡液究根源張令韶曰此發汗多而傷其心氣也汗為心液汗出過多則心液空而喜按故用桂枝以保心氣甘草助中土以防水逆不令腎氣乘心茯苓桂枝甘草大棗湯治發汗後其人臍下悸者欲作奔豚此方主之茯苓半斤桂枝四兩甘草四兩炙大棗十五枚上四味以甘瀾水一斗先煮茯苓減二升納諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水一斗置在盆內以杓揚之水上有珠子五六千顆相逐取用之歌曰八兩茯苓四桂枝炙甘四兩悸堪治棗推十五扶中土煮取甘瀾兩度施程知本甘草二兩蔚按此治發汗而傷其腎氣也桂枝保心氣於上茯苓安腎氣於下二物皆能化太陽之水氣甘草大棗補中土而制水邪之溢甘瀾水速諸藥下行此心悸欲作奔豚圖於未事之神方也厚朴生薑甘草半夏人參湯治發汗後腹脹滿此方主之厚朴半斤炙去皮生薑半斤半夏半升洗甘草二兩人參一兩上五味以水一斗煮取三升去滓溫服一升日三服歌曰厚朴半斤薑半斤一參二草亦須分半升夏最除虛滿汗後調和法出群張令韶曰此治發汗而傷脾氣汗乃中焦水穀之津汗後亡津液而脾氣虛脾虛則不能轉輸而脹滿矣夫天氣不降地氣不升則為脹滿厚朴色赤性溫而味苦泄助天氣之下降也半夏感一陰而生能啓達陰氣助地氣之上升也生薑宣通滯氣甘草人參所以補中而滋生津液者也津液足而上下交則脹滿自消矣茯苓桂枝白朮甘草湯治傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振搖者此方主之茯苓四兩桂枝三兩白朮二兩甘草二兩炙上四味以水六升煮取三升去滓分溫三服歌曰病因吐下氣衝胸起則頭眩身振從茯四桂三術草二溫中降逆效從容張令韶曰此治吐下後而傷肝氣也心下逆滿者心下為脾之部位脾主中焦水穀之津吐下以傷其津遂致脾虛而為滿脾虛而肝氣乘之故逆滿也氣上衝胸等句皆言肝病之本脈本證方中只用桂枝一味以治肝其餘白朮茯苓甘草皆補脾之藥最為得法即金匱所謂知肝之病當先實脾是也芍藥甘草附子藥治發汗病不解反惡寒者虛故也此湯主之芍藥三兩甘草三兩炙附子一枚炮去皮破八片以上三味以水五升煮取一升五合去滓溫服歌曰一枚附子勝靈丹甘芍平行三兩看汗後惡寒虛故也經方祕旨孰能攢男元犀按各家以此證為發汗虛其表陽之氣似是而非於病不解三字説不去且虛故也三字亦無來歷蓋太陽之邪法從汗解汗而不解餘邪未淨或復煩發熱或如瘧狀亦有大汗亡陽明之陽用白虎加人參法亡少陰之陽用真武四逆法論有明訓也今但云不解可知病未退而亦未加也惡寒而曰反者奈何謂前此無惡寒證因發汗而反增此一證也惡寒若系陽虛四逆輩猶恐不及竟以三兩之芍藥為主並無薑桂以佐之豈不慮戀陰以撲滅殘陽乎師恐人因其病不解而再行發汗又恐因其惡寒而徑用薑附故特切示曰虛故也言其所以不解所以惡寒皆陰陽素虛之故補虛自足以勝邪不必他顧也方中芍藥甘草苦甘以補陰附子甘草辛甘以補陽附子性猛得甘草而緩芍藥性寒得附子而和且芍草多而附子少皆調劑之妙此陰陽雙補之良方也論中言虛者間於節中偶露一二語單言虛而出補虛之方者只一節學者當從此隅反之茯苓四逆湯治發汗若下之病仍不解煩躁者此方主之茯苓四兩一本六兩人參一兩附子一枚生用甘草二兩炙乾薑一兩半上五味以水五升煮取三升去滓溫服七合日三服歌曰生附一枚兩半薑二甘六茯一參當汗傷心液下傷腎腎躁心煩得媾水火交媾則煩躁定矣昌張令韶曰此汗下而虛其少陰水火之氣也汗下之後心腎之精液兩虛以致病仍不解陰陽水火離隔而煩躁也煩者陽不得通陰也躁者陰不得遇陽也茯苓人參助心主以止陽煩四逆補腎臟以定陰躁五苓散治發汗後煩渴欲飲水者主之豬苓十八銖澤瀉一兩六銖白朮十八銖茯苓十八銖桂枝半兩去皮上五味搗為末以白飲和服方寸匕日三服多飲暖水汗出愈內臺茯苓豬苓白朮各一兩澤瀉二兩桂枝半兩為末歌曰豬術茯苓十八銖澤宜一兩六銖符桂枝半兩磨調服暖水頻吞汗出蘇魏念庭云設非用散而用煎則內外迎拒藥且不下又何能多服暖水不吐乎次男元犀按苓者令也化氣而通行津液號令之主也豬苓茯苓澤瀉皆化氣之品有白朮從脾以輸轉之則氣化而水行矣然表裡之邪不能因水利而兩解故必加桂枝以解之作散以散之多服暖水以助之使水精四布上滋心肺外達皮毛微汗一出而表裡之煩熱兩蠲矣白飲和服亦即桂枝湯啜粥之義也茯苓甘草湯治傷寒汗出而渴者五苓散主之不渴者此方主之茯苓三兩桂枝二兩甘草一兩生薑三兩上四味以水四升煮取三升去滓分溫三服歌曰汗多不渴此方求又治傷寒厥悸優二桂一甘三薑茯須知水汗共源流蔚按此承上服五苓散多飲暖水以出汗人知五苓之用在汗而不知五苓之證在渴也五苓證之渴為脾不轉輸非關胃燥推而言之不輸於上為渴不輸於中為水逆不輸於下為小便不利雖有煩熱之病責在水津不能四布故白朮桂枝之辛溫不避也論曰汗出而渴可知中焦水穀之津發泄而傷脾脾傷則不能輸津而作渴故取五苓散布散其水津若不渴者中焦之液未傷只用茯苓甘草湯取茯苓之利水俾腎水不沸騰而為汗
