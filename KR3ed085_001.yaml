body:
  text: 卷首醫病順其自然説病人之吉凶禍福寄之於醫醫者之任重然權不操諸醫而操諸用醫之人何也人有大病庸醫束手無策始求救於名醫名醫入門診畢告以病從何來當從何去得那一類藥而增劇者何故得那一類藥除去那一病而此外未能盡除者何故病勢雖覺稍愈逾一二日仍作或逾一二日而更甚於前者又何故一一為病家説明定其如此救誤如此溫清攻補如此按法立方服藥後必見出何證又見出何證則可愈預斷其愈於何日何時病家能一一信其言而不疑且架中不藏本草備要醫方集解萬病回春本草綱目東醫寶鑑馮氏錦囊赤水玄珠薛氏醫按景嶽全書石室祕録辨證奇聞臨證指南之類又無強不知以為知之親友與依阿兩可素稱果子藥之先生朱紫不亂則名醫得以盡其所長傷寒卒病二三日可愈最遲亦不出十八日之外風癆臌膈一月可愈最遲亦不出三月之外否則病家疑信參半時醫猶可勉強從事俟其病氣衰而自愈若以名醫自命者斷不可肩此重任反致取怨敗名余因熱腸而備嘗其苦凡我同志可以鑑此前車今之方技家恃在口給見有同我者引之互相標榜遜我者亦不卻之臨深為高至於窮本草經讀靈素法仲景其立論為耳所未聞其治效又目所僅見遂謙讓曰我不能如此之神亦不能如此之偏以取勝也若輩造此偏之一字任令法高一丈其奈魔高十丈且謂古書不可以今用即於多讀書處謂其偏起死證而生之即以出奇入險目其偏以致病家先入為主廣集不偏之醫歷試罔效不得已始延為破釜沉舟之計究竟終疑其偏麻桂硝黃則曰汗下之太過也薑附芩連則曰寒熱之太峻也建中理中陷胸十棗則曰補瀉之不留餘地也滋水之地黃補元之人參用應多而反少日食之棗子至賤之甘草用應少而反多此等似是而非之言更甚於恣肆不倫於理之言知幾者正可以拂衣而去乃猶曰病尚可為不忍恝然而舍之此雖活人無已之心而疑事無功未能活人且以誤人蓋藥之所以流行於經絡臟腑內外無有不到者氣為之也氣不自到心氣主之膽氣壯之也彼既疑我為偏一見我之用藥又出於意想之外則心氣亂內經云心者君主之官也神明出焉又云主不明則十二官危是也不獨心氣亂而且膽氣亦因之而怯內經云膽者中正之官決斷出焉又云十二經皆取決於膽是也藥乃草根樹皮及一切金石之鈍物原藉人之真氣以流行今心氣亂而妄行膽氣怯而不行如芩連入口其寒性隨其所想而行旋而皮毛鼓栗而寒狀作矣薑附入口其熱性隨其所想而行旋而心煩面赤而熱狀作矣凡此之類不過言其大略不必淋漓痛切而再言之其中之所以然者命也我亦順其自然而已矣又何必多事為凡我同志者能以余為前車之鑑則道愈彰而活人愈衆徵引三條一傷寒論平脈法第十三節問曰脈有災怪何謂也師曰假令人病脈得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪問曰何緣得此吐利答曰或有舊時服藥今乃發作故為災怪耳程郊倩注曰望問固醫家之事亦須病家毫無隱諱方能盡醫家之長因復出此條為病家服藥瞞醫之戒災因自作而反怪及醫故曰災怪然更有怪災病不可不知得仲景法處仲景方病家大怪以示諸醫益搖腦吐舌而大怪乃從其不怪者治之輕者劇重者死而災及其身終不解其病謂何病此病近日竟成疫沿門漸染仲景卻未言及想仲景時只有災怪病尚無怪災病耳一噱按程郊倩謂怪災病孽不在庸醫之好造謠言而在病家之貴耳賤目執俗本之本草查對名醫之處方執俗本之套語貶駁名醫之治法以致名醫嘆息而不與辨決然而去豈非災由自取耶憶戊辰春李太守名符清患氣短病余主以桂苓甘術湯與腎氣丸間服許以半月必效旋有所聞驚怪而阻另延津門陶老醫服葶藶杏仁枇杷葉木通之類三十餘劑脹腫癃閉而逝候補知縣葉名鈞偶患咳嗽微發熱小便不利余曰小青龍湯一服可效渠怪而不服另延姑蘇葉天士之族侄診之説水不制火火氣刑金君以地黃兩許麥冬阿膠枇杷葉貝母之類為佐二十餘日後與余相遇於北關官廨自言咳嗽已愈惟早起氣覺短促余無他病余察其面部皮裡膜外伏青黯之色圜口尤甚按其脈數而弦芤重按之散而無神遂直告之曰此群陰用事陽光欲熄之候宜拋去前藥以白朮附子濃煎調生薑自然汁半杯六七服尚可急救葉公以余言太激而不答是晚自覺倦怠異常前醫仍用熟地一兩黨參五錢枸杞麥冬阿膠各三錢杜仲酒芍當歸各二錢炙甘草一錢服之次早神昏不語痰涎如湧渠胞弟驚告余曰前言一線殘陽扶之尚恐不及況以熟地等助其陰霾之氣乎今陰霾之氣上彌天際痰涎湧盛狀如中風蓋以肝為風木之臟人當東方生氣將脫之頃往往外呈此象其證與中風無異也診其脈弦數散亂三五不調余直辭不治次日未刻果歿庚午秋七月前任天津尹丁名攀龍過余旅寓見其面上皮里黧黑環唇更甚臥蠶微腫鼻上帶些青色余直告之曰君有水飲之病根挾肝氣而橫行無忌此時急療可愈若遲至二十日病一發作恐醫日多方日雜總不外氣血痰鬱四字定出搔不著癢之套方即有談及水飲緩治以六君二陳加減峻治以滾痰黑錫專方此敷衍題面而題理題神則盡錯矣以藥試病試窮則變計雖盧扁莫何丁君心怪言之過激弗聽至七月下旬病作中秋後漸重九月下旬邀診余告之曰嚮者所陳之弊今一一蹈之前説明病發後毋庸用藥非自今推諉然無中生有之治法惟金匱咳嗽篇用十棗湯云咳家其脈弦者有水此主之又云支飲家咳煩胸中痛者不卒死至一百日或一歲亦宜用此湯推病根成於舊歲冬初未及一歲且病發止六十餘日尚在百日之內喻嘉言醫門法律咳嗽續論篇言之甚詳俟有識有膽者用之而余則不能坐中有一老醫力爭不可余姑擬龍牡甘苓行水化氣等藥而去遂不復延嗣余奉委到高陽辦理賑務聞渠延醫滿座日以熟地枇杷葉炮薑附子肉桂人參服之不斷漸至大喘腫脹吐血大衄耳目俱出血小水全無而歿此皆怪災病之新案二張隱菴曰順治辛卯歲豫年四十有二八月中生一胃脘癰在鳩尾斜下右寸許微腫不紅按之不痛隱隱然如一雞卵在內姚繼元先生視之曰此胃脘癰也一名捧心癰速宜解散否則有性命之憂與一大張膏藥上加末藥二三錢午間烘貼至暮手足蘇軟漸至身不能轉側仰臥於書齋心煩意亂屏去家人至初更時癰上起一毒氣從左乳下至肋下脅入於左腎入時如燒錐刺入眼中一陳火光大如車輪神氣昏暈痛楚難言火光漸搖漾而散神昏始蘇過半時許其氣復起其行如舊痛楚如前如此者三四次豫思之此戊與癸合也然腑邪入臟自分必死妄想此毒氣不從脅下入腎得從中而入於腸胃則生矣如此靜而行之初次不從二次即隨想而仍從於左乳下入於腸中腹中大鳴無從前之痛楚矣隨起隨想因悟修養之道氣隨想而運用者也運氣法大能起鼓脹之證勞怯咳嗽亦妙至天明大泄數次胸膈寬疏繼元先生復視之曰毒已散解無妨事矣至次年中秋復發仍用膏藥末藥毫無前番之狀而腫亦不消豫因想運氣之妙徑行坐臥以手按摩意想此毒氣仍歸腸胃而出如此十餘日而散按讀此案知病家不能深信斷斷不可勉強相從且不必言及治當何法應用何方恐後到之醫矯吾言而走入錯路又恐其從吾言而還致生疑不如三緘其口之為得三喻嘉言寓意草云王岵翁深知醫理投劑咸中肯綮所以長年久世然苦耳鳴不樂對客其左右侍從誰能究心醫藥之事前病獲安競以為人參之力而卸禍者反得居功謂其意中原欲用參但不敢專主姑進余商榷以示詳慎耳於是善後之宜一以諉之曾不顧夫一誤再誤也前所患虛風症余用甘寒藥二劑稍效俄焉更醫而致危不得已又召余視之雖用旋覆代赭二劑回天然前此虛風本症尚無暇於驅除而主家及醫其時方競夸人參之力謂調理更宜倍用無俟參酌獨不思虛風醞釀日深他日再求良治不能及矣余向為岵翁視病言無不聽獨患此大病竟不樂與交談且日來喜食羊肉河豚以召風然亦不自由也蓋風煽胃中如轉丸之捷食入易消不得不借資於厚味而不知胃中元氣久從暗耗設虛風止熄即清薄之味尚不易化況於肥甘乎今之醫家全不究病前病後消息明語以虛風之證竟不知虛風為何物奈何言醫耶奈何言調攝耶彼時余適有浙遊旋日復得重恙召診時語余云一病幾危今幸稍可但徹夜撰改本章不輟神亂奈何余對曰胃風久熾津液乾稿真火內燔宜用知母一兩人參甘草各一錢日進二劑自安衆議方中用參太少且無補藥佐之全無取義竟置不用連進參術大劑不效越三日劑中人參竟加一兩服後頃刻氣高不返而逝按讀此案以自知醫理與平時心服之人忽為時醫蠱惑侍從尼阻竟至不能用而死可知命之所定非人力所能主也嘉言既盡其道可告無罪於王岵翁而人言不足恤也余因之有感焉天下事事後易為智大病一愈邀功者議補議溫紛紛不一以致既愈之後仍留遺患者有之垂成忽敗者有之夫大病自我愈之而善後之計不復一商者其故有二一以勝任有人也一以酬謝可免也偷薄之風適以殞命堪發一嘆考二章錢天來云漢之一兩即今之二錢七分也一升即今之二合半也汪苓友云古云銖者六銖為一分即二錢半二十四銖為一兩也云一升者即今之大白盞也古方全料謂之一劑三分之一謂之一服凡用古方先照原劑按今之碼子折實若干重古方載三服者只取三分之一遵法煎服載兩服者宜分兩次服之頓服者取一劑而盡服之只要按今之碼子折之至大棗烏梅之類仍照古方枚數以碼子有古今之不同而果枚古今無異也程扶生云古以二十四銖為一兩一兩分為四分去聲六銖為一分計二錢五分則所謂十八銖者蓋三分之重古之七錢半也然以古今量度及秬黍考之以一千二百黍之重實於黃鐘之籥得古之半兩今之三錢也合兩籥為合得古之一兩今之六錢也十銖為一千黍之重今之二錢半也一銖為百黍之重今之二分半也或又謂古今量度惟漢最小漢之一兩惟有今之三錢半強故千金本草以古三兩為今一兩古三升為今一升然世有古今時有冬春地有南北人有強弱大約古用一兩今用一錢足矣宜活法通變不必膠柱而鼓瑟則為善法仲景者矣愚按諸説頗有異同大抵古之一兩今折為三錢不泥於古而亦不離於古也勸讀十則一凡積重難反之勢驟奪其所好世必驚疑今且淺而商之明藥性始於神農本經論病情始於靈樞素問以藥治病始於伊尹湯液逮漢仲師出集伊聖及上古相傳之經方著傷寒論及金匱玉函經二書外臺謂又有小品一書今失傳方諸舉業家與四子書無異而猶有疑之者豈四子之書亦不可讀乎則以讀仲師書為第一勸二仲師書文義古奧難讀即劉張朱李四家明時以張長沙與劉河間李東垣朱丹溪為四家此李士材之誤也張石頑云張是張子和當知相沿之誤雖尊仲聖之名鮮有發揮更有庸妄者顛倒是非謂仲師專工於傷寒其桂枝麻黃只行於西北宜於冬月以芎蘇羌獨荊防等劑為感冒切用之品以補中歸脾八珍六味等方為雜病平穩之方百病不究根由只以多熱為陰虛多寒為陽虛自誇為挈領提綱之道究竟偽術相師能愈一大病否夜氣猶存舉生平所治之證平心自問當亦知所變計也則以知過必改為第二勸三經方效如桴鼓非若後世以地黃補陰以人參補陽以香砂調氣以歸芎調血籠統浮泛待病氣衰而自愈也內經云一劑知二劑已又云覆杯而臥傷寒論云一服愈不必盡劑可知古人用藥除宿病痼病外其效只在半劑一二劑之間後世如薛立齋醫按云服三十餘劑及百劑效李士材云備參五斤期於三月奏效此豈果服藥之效哉乃病氣衰而自愈若輩貪天之功而為己力也余閲其案深憫病人之困於藥甚於桎梏也則以經方之療效神速為第三勸四傷寒論一百一十三方以存津液三字為主試看桂枝湯和平解肌無一非養液之品即麻黃湯輕清走表不加薑之辛熱棗之甘壅從外治外不傷營氣亦是養液之意故統制一劑分為三服不必盡劑可愈愈後亦無他病近醫芎蘇羌獨荊防蒼芷苦燥辛烈大傷陰氣最陋是吾閩習氣謂二陳湯為發汗平穩之劑方中如陳皮之耗氣半夏之耗液性澀如血出不止以此藥生搗敷之則止止血即止汗之驗茯苓滲利太早致邪陷入少陰皆所以涸其汗源此二字余研究十年方悟留邪生熱以致變成煩躁大渴譫語神昏等證所謂庸醫誤人者此也至於金匱一百四十三方大旨是調以甘藥四字後世之四君子湯補中益氣湯及四物八珍十全歸脾逍遙等劑頗得甘調之意而偏駁不馴板實不靈又不可不知則明經方之有利無害為第四勸五仲師為醫中之聖人非至愚孰敢侮聖所疑者其方也方中無見證治證之品且銖兩升斗畏其大劑不敢輕試不知本草亂於宋元諸家而極於明之李時珍能讀本經洞達藥性者自知其三四味中備極神妙況古人升斗權衡三代至漢較之今日僅十之三每劑分三服一服亦不過七八錢與兩零而已較之時方之重者乃更輕今以古今之碼子折算又為之淺淺解釋俾知經方道本中庸人與知能為第五勸六先入為主人之通患也桂枝湯小柴胡湯無論傷寒雜病陽經陰經凡營衛不和者得桂枝而如神邪氣不能從樞而外轉者得柴胡而如神今人惑於活人春夏忌桂之説又惑於前醫邪在太陽誤用柴胡反致引入少陽之説及李時珍虛人不可多用張景嶽制五柴飲列於散陳遂致應用不用誤人無算而不知二藥神農列之上品久服可以卻病延年今之信各家而不信神農誠可怪也閩醫習見余用桂枝湯萬無一失此數年來自三錢亦用至八九錢而效者咸知頌豫創始之德至於柴胡不過四錢而止而浙省江蘇每用必以鱉血拌蒸最多不過二錢皆先入之説誤之也不知長沙方柴胡用至八兩取其性醇不妨多服功緩必須重用也本經崇原云柴胡出於銀州者佳今肆中另有一種銀柴胡不知何草之根害人不淺推之細辛五味用不過一錢大棗不過二枚生薑不過二片種種陋習皆違經旨吾願同事者先迸去市中徇人惡習而以愈達愈上為第六勸七起生回生醫之道也如醫家束手病家待斃察其為雜法所誤先與病家説明璧其方資愈不受謝照仲師法四逆白通以回陽承氣白虎以存陰助其樞轉運其針機臟腑調和統歸胃氣危急拯救不靠人參此一句為病家之腦後下一針也經方無用參為救急法惟霍亂有理中丸湯方然汗厥脈微欲絶以通脈四逆加豬膽湯為主又無取乎人參第不可與讀薛氏景嶽等書人説也力肩其任亦可救十中二三余自臨證三十餘年知經方之權奪造化為第七勸八經方愈讀愈有味愈用愈神奇凡日間臨證立方至晚間一一於經方查對必別有神悟則以溫故知新為第八勸九醫門之仲師即儒宗之宣聖凡有闡揚聖訓者則遵之其悖者則貶之障川東流功在吾輩如四家中劉河間書雖偏苦寒尚有見道之言朱丹溪雖未究源頭卻無支離之處張子和瑕瑜參半最下是李東垣豎論以脾胃為主立方以補中為先徇其名而亡其實燥烈劫陰毫無法度嘗考醫論中載其人富而好名巧行其術邪説流傳至今不熄正與仲師養津液及調以甘藥之法相反不可不知至於李時珍王宇泰之雜李士材之淺薛立齋之庸趙養葵之妄張景嶽陳遠公馮楚瞻之浮誇影響不使一字寓目方可入於精微之奧坊刻汪訒庵等本雖云耳食卻有一二道得著處但於仲師方末雜引陶節庵諸輩臆説不無朱紫之亂入門時始參其説終為鄉願矣則以專一不雜為第九勸十亞聖有云豫豈好辨哉不得已也今醫學各成門戶所藉乎明先聖之功溯委窮源不絶於口則陷溺未久及穎慧過人者自必悔而就學道不孤矣若言之過激則怨而生謗位置過高則畏而思避踽踽獨行濟人有幾凡我同人務宜推誠相與誠能動物俾此道日益昌明則以有言無隱和氣可親為第十勸
