body:
  text: 卷三太陽方梔子豉湯治發汗吐下後虛煩不得眠反覆顛倒心中懊憹者梔子十四枚生用擘香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分為二服溫進一服得吐者止後服從張本刪此二句歌曰山梔香豉治何為煩惱難眠胸窒宜十四枚梔四合豉先梔後豉法煎奇男元犀按此湯舊本有得吐止後服等字故相傳為湧吐之方高明如柯韻伯亦因其説惟張隱菴張令韶極辨其訛曰瓜蒂散二條本經必曰吐之梔子湯六節並不言一吐字且吐下後虛煩豈有復吐之理乎此因瓜蒂散內用香豉二合而誤傳之也愚每用此方服之不吐者多亦或有時而吐要之吐與不吐皆藥力勝病之效也其不吐者所過者化即雨露之用也一服即吐者戰則必勝即雷霆之用也方非吐劑而病間有因吐而愈者所以為方之神妙梔子色赤象心味苦屬火性寒導火熱之下行豆形象腎色黑入腎製造為豉輕浮引水液之上升陰陽和水火濟而煩熱懊憹結痛等證俱解矣原本列於太陽主解煩非吐劑而有時亦能湧吐也韻伯移入陽明只知為吐劑泄陽明之煩熱即此為仁者見仁知者見知也梔子甘草豉湯治梔豉湯證中若少氣者主之梔子十四枚甘草二兩內臺止用半兩香豉四合上三味以水四升先煮梔子甘草取二升半內豉煮取升半去滓分溫二服從張氏重訂下同梔子生薑豉湯治梔子豉湯證中若加嘔者此方主之梔子十四枚生薑五兩內臺止用一兩香豉四合上三味以水四升先煮梔子生薑取二升半內豉煮取升半去滓分溫二服歌曰梔豉原方效可誇氣羸二兩炙甘加若加五兩生薑入專取生薑治嘔家蔚按梔豉解見上汗吐下後中氣虛不能交通上下故加甘草以補中嘔者汗吐下後胃陽已傷中氣不和而上逆故加生薑暖胃解穢而止逆也梔子厚朴湯治傷寒下後心煩腹滿臥起不安者此方主之梔子十四枚厚朴四兩枳實四枚水浸去穰炒上三味以水三升煮取一升半去滓分溫二服本張氏重訂歌曰朴須四兩枳四枚十四山梔亦妙哉下後心煩還腹滿止煩泄滿效兼該柯韻伯曰心煩則難臥腹滿則難起起臥不安是心移熱於胃與反覆顛倒之虛煩不同梔子治煩枳朴泄滿此兩解心腹之妙劑也梔子乾薑湯治傷寒醫以丸藥大下之身熱不去微煩者主之梔子十四枚乾薑二兩上二味以水三升半煮取一升半去滓分二服溫進一服從張氏刪去二句歌曰十四山梔二兩薑以丸誤下救偏方微煩身熱君須記辛苦相需盡所長張令韶曰梔子導陽熱以下行乾薑溫中土以上達上下交而煩熱止矣附録家嚴新案嘉慶戊辰吏部謝芝田先生令親患頭項強痛身疼心下滿小便不利服表藥無汗反煩六脈洪數初診疑為太陽陽明合病諦思良久曰前病在無形之太陽今病在有形之太陽也但使有形之太陽小便一利則所有病氣俱隨無形之經氣而汗解矣用桂枝去桂加茯苓白朮湯一服遂瘥惟夜間不寐特告曰此名虛煩因辛熱遺害若用棗仁遠志茯神等藥反招集其所遺而為孽病必復作矣用梔子豉湯即愈嘉慶己巳季春曹扶谷明府患頭痛項強惡寒等證自差次回垣後更增出寒熱往來欲嘔胸滿等證家嚴診其脈數中見小按之虛不應指駭謂之曰陽證見陰脈法在不治所幸者大小便如常神識頗清正雖虛而尚未潰察其胸滿欲嘔寒熱往來之證俱是病氣欲從樞轉之象當乘機而利導之遂令一日服小柴胡兩劑柴胡每劑八錢次日再診以上諸證雖退而心胸懊憹不安語言錯亂無次實覺可憂又診其脈略緩遂為之喜曰邪從樞轉而出故寒熱等證俱平正為邪熱所傷故煩昏等證並見此時須當救正但救正二字不讀傷寒金匱便以人參誤事立主用梔子豉湯從離坎交媾處撥動神機服後停藥靜候三日值陽明主氣之期申酉為陽明正旺之時戊癸相合自愈果如言應期而效真武湯治太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者此方主之又治少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便自利或嘔者此方主之茯苓三兩芍藥三兩生薑三兩白朮二兩附子一枚炮上五味以水八升煮取三升去滓溫服七合日三服歌曰生薑芍茯數皆三二兩白朮一附探便短咳頻兼腹痛驅寒鎮水與君談加減歌曰咳加五味要半升乾薑細辛一兩具一本去生薑小便若利恐耗津須去茯苓腎始固下利去芍加乾薑二兩溫中能守住若嘔去附加生薑足前須到半斤數張令韶曰虛者不可汗汗後病不解而變證也真武者鎮水之神也水性動今動極不安故亦以此鎮之茯苓松之餘氣潛伏於根故歸伏心神而止悸附子啓下焦之生陽上循於頭而止眩芍藥滋養營血生薑宣通經脈而瞤動自止白朮所以資中土而灌溉四旁者也羅東逸曰小青龍湯治表不解有水氣中外皆寒實之病也真武湯治表已解有水氣中外皆虛寒之病也真武者北方司水之神也以之名湯者藉以鎮水之義也夫人一身制水者脾也主水者腎也腎為胃關聚水而從其類倘腎中無陽則脾之樞機雖運而腎之關門不開水即欲行以無主制故泛溢妄行而有是證也用附子之辛熱壯腎之元陽則水有所主矣白朮之溫燥建立中土則水有所制矣生薑之辛散佐附子以補陽於補水中寓散水之意茯苓之淡滲佐白朮以健土於制水中寓利水之道焉而尤重在芍藥之苦降其旨甚微蓋人身陽根於陰若徒以辛熱補陽不少佐以苦降之品恐真陽飛越矣芍藥為春花之殿交夏而枯用之以亟收散漫之陽氣而歸根下利減芍藥者以其苦降湧泄也加乾薑者以其溫中勝寒也水寒傷肺則咳加細辛乾薑者勝水寒也加五味子者收肺氣也小便利者去茯苓恐其過利傷腎也嘔者去附子加生薑以其病非下焦水停於胃所以不須溫腎以行水只當溫胃以散水且生薑功能止嘔也小柴胡湯治少陽經發熱口苦耳聾其脈弦者又治太陽陽明二經發熱不退寒熱往來柴胡半斤黃芩三兩人參三兩甘草三兩生薑三兩半夏半升洗大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞硬去大棗加牡蠣四兩若心下悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂枝三兩溫覆取微汗愈若咳者去人參大棗生薑加五味子半升乾薑二兩歌曰柴胡八兩少陽憑棗十二枚夏半升三兩薑參芩與草去渣重煎有奇能中而達外生薑所以發散宣通者也此從內達外之方也愚按原本列於太陽以無論傷寒中風至五六日之間經氣一周又當來復於太陽往來寒熱為少陽之樞象此能達太陽之氣從樞以外出非解少陽也各傢俱移入少陽篇到底是後人識見淺處加減歌曰胸煩不嘔除夏參蔞實一枚應加煮若渴除夏加人參合前四兩五錢與蔞根清熱且生津再加四兩功更巨腹中痛者除黃芩芍加三兩對君語脅下痞硬大棗除牡蠣四兩應生杵心下若悸尿不長除芩加茯四兩侶外有微熱除人參加桂三兩汗休阻咳除參棗並生薑加入乾薑二兩許五味半升法宜加溫肺散寒力莫御張令韶曰太陽之氣不能從胸出入逆於胸脅之間雖不幹動在內有形之臟真而亦干動在外無形之臟氣然見一臟之證不復更及他臟故有七或證也胸中煩者邪氣內侵君主故去半夏之燥不嘔者中胃和而不虛故去人參之補加栝蔞實之苦寒導火熱以下降也渴者陽明燥金氣盛故去半夏之辛倍人參以生津加栝蔞根引陰液以上升也腹中痛者邪干中土故去黃芩之苦寒加芍藥以通脾絡也脅下痞硬者厥陰肝氣不舒故加牡蠣之純牡能破肝之牝臟其味鹹能軟堅兼除脅下之痞去大棗之甘緩欲其行之捷也心下悸小便不利者腎氣上乘而積水在下故去黃芩恐苦寒以傷君火加茯苓保心氣以制水邪也不渴外有微熱者其病仍在太陽故不必生液之人參宜加解外之桂枝覆取微汗也咳者形寒傷肺肺氣上逆故加乾薑之熱以溫肺五味之斂以降逆凡咳皆去人參長沙之祕旨既有乾薑之溫不用生薑之散既用五味之斂不用大棗之緩也小建中湯治傷寒陽脈澀陰脈弦法當腹中急痛者以此方主之又傷寒二三日心中悸而煩者此方主之芍藥六兩桂枝三兩甘草二兩生薑三兩膠飴一升大棗十二枚上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用建中以甜故也歌曰建中即是桂枝湯倍芍加飴絶妙方飴取一升六兩芍悸煩腹痛有奇長程扶生曰傷寒二三日邪尚在表未及傳裡之時悸則陽虛煩則陰虛故以芍藥之苦以益陰薑桂之辛以扶陽而復用甘草大棗之甘溫緩其中中既建則邪不致入里矣而薑桂等又能托邪外出此為陰陽兩虛之人而立一養正驅邪法也張令韶曰經隧之血脈流行不息今寒氣入而稽遲之入陽絡則陽脈澀入陰絡則陰脈弦法當腹中急痛先與建中湯以經隧之血脈皆中胃之所生更得小柴胡湯以轉樞機樞機利則經隧之血脈通矣通則不痛也蔚考金匱黃耆建中湯有加減法小建中湯無加減法今查內臺方議亦有加減未知為年久脫簡抑或許氏新附與否姑録之以備參考方議載建中湯治虛痛者加黃耆治心痛者加元胡索治血虛者加當歸川芎治盜汗多者加小麥茯神治虛中生熱加柴胡地骨皮大柴胡湯治太陽病未解便傳入陽明大便不通熱實心煩或寒熱往來其脈沉實者以此方下之柴胡半斤半夏半升芍藥三兩黃芩三兩生薑五兩枳實四枚炙大棗十二枚上七味以水一斗二升煮取六升去滓再煎溫服一升日三服一方用大黃二兩若不加大黃恐不為大柴胡湯也按此方原有兩法長沙並存其説而用之歌曰八柴四枳五生薑芩芍三分二大黃半夏半升十二棗少陽實證下之良蔚按凡太陽之氣逆而內干必藉少陽之樞轉而外出者仲景名為柴胡證但小柴胡證心煩或胸中煩或心下悸重在於脅下苦滿而大柴胡證不在脅下而在心下曰心下急鬱郁微煩曰心下痞硬以此為別小柴胡證曰喜嘔曰或胸中煩而不嘔而大柴胡證不獨不嘔而且嘔吐不獨喜嘔而且嘔不止又以此為別所以然者太陽之氣不從樞外出反從樞內入於君主之分視小柴胡證頗深也方用芍藥黃芩枳實大黃者以病勢內入必取苦泄之品以解在內之煩急也又用柴胡半夏以啓一陰一陽之氣生薑大棗以宣發中焦之氣蓋病勢雖已內入而病情仍欲外達故制此湯還藉少陽之樞而外出非若承氣之上承熱氣也汪訒庵謂加減小柴胡小承氣而為一方未免以庸俗見測之也柴胡加芒硝湯治傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡以解外後以此湯主之柴胡二兩十六銖半夏二十銖黃芩一兩甘草一兩生薑一兩人參一兩大棗四枚芒硝二兩上八味以水四升煮去二升去滓內芒硝更煮微沸分溫再服此藥劑之最輕者以今稱計之約二兩分二服則一服止一兩耳歌曰小柴分兩照原方二兩芒硝後入良誤下熱來日晡所補兼蕩滌有奇長此歌照內臺方宋本玉函經然當照成氏為妥蔚按小柴胡湯使太陽之氣從樞外出解見原方茲云十三日經盡一周既來復於太陽當解而不能解又交陽明主氣之期病氣亦隨經氣而涉之陽明主胸少陽主脅胸脅滿而嘔者陽明之闔不得少陽之樞以外出也日晡所者申酉戌之際也陽明旺於申酉戌故應其時而發潮熱熱已微利者陽明之氣雖實其奈為丸藥所攻而下陷陷者舉之用小柴胡湯以解外解寓升發之義即所以舉其陷而止其利也又加芒硝者取芒硝之鹹寒以直通地道不用大黃之苦寒以犯中宮蓋陽明之氣既傷不宜再傷師之不用大柴而用小柴其義深矣桃仁承氣湯治太陽病不解熱結膀胱其人如狂血自下者愈其外不解者尚未可攻當先解外外已解但小腹急結者乃可攻之宜此方主之桃仁五十個大黃四兩甘草二兩生桂枝二兩芒硝二兩上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利歌曰五十桃仁四兩黃桂硝二兩草同行膀胱熱結如狂證外解方攻用此湯蔚按張令韶謂太陽有氣有經其氣從胸而出入其經挾脊入循膂而內絡膀胱如病邪從胸脅而入涉於陽明少陽之分則為小柴胡湯證循背膂而入自入於太陽之腑則為桃仁承氣湯證太陽之腑曰膀胱在小腹之間為血海之所膀胱有津液而無血而與胞中之血海相連熱干之陰不勝陽則動胞中之血而自下故其人如狂然病起外邪當先解外必審其小腹急結乃可攻之急結者其血有急欲通之象也桃得陽春之生氣其仁微苦而湧泄為行血之緩藥得大黃以推陳致新得芒硝以清熱消瘀得甘草以主持於中俾諸藥遂其左宜右有之勢桂枝用至二兩者注家以為兼解外邪而不知辛能行氣氣行而血乃行也男蔚按內經曰血在上喜忘血在下如狂柴胡加龍骨牡蠣湯治傷寒八九日下之胸脅滿煩驚小便不利譫言一身盡重不可轉側者此方主之柴胡一兩半龍骨一兩半黃芩一兩半生薑一兩半人參一兩半茯苓一兩半鉛丹一兩半牡蠣一兩半桂枝一兩半半夏一兩半大棗六枚大黃二兩上十二味以水八升煮取四升內大黃更煮一二沸去滓溫服一升此分兩照宋本玉函經及內臺方若傷寒論柴胡則用四兩半夏二合歌曰參芩龍牡桂丹鉛苓夏柴黃薑棗全棗六餘皆一兩半大黃二兩後同煎內臺方議云傷寒八九日邪氣錯雜表裡未分而誤下之則虛其里而傷其表胸滿而煩者邪熱客於胸中驚者心惡熱而神不守也小便不利者裡虛津液不行也譫語者胃熱也一身盡重不可轉側者陽氣內榮於裡不行於表也故用柴胡為君以通表裡之邪而除胸脅滿以人參半夏為臣輔之加生薑大棗而通其津液加龍骨牡蠣鉛丹收斂神氣而鎮驚為佐加茯苓以利小便而行津液加大黃以逐胃熱止譫語加桂枝以行陽氣而解身重錯雜之邪共為使以此十一味之劑共救傷寒壞逆之法也傷寒論共十二味一本無黃芩止十一味也桂枝去芍藥加蜀漆牡蠣龍骨救逆湯治傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者此方主之桂枝三兩甘草二兩大棗十二枚生薑三兩牡蠣熬五兩龍骨四兩蜀漆三兩洗去腥上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升一本蜀漆四兩歌曰桂枝去芍已名湯蜀漆還加龍牡藏五牡四龍三兩漆能療火劫病驚狂張令韶曰傷寒脈浮病在陽也太陽與君火相合而主神心為陽中之太陽醫以火迫劫亡陽亡其君主之陽非下焦生陽之陽也心為火迫則神氣外浮故如驚狂而不安桂枝色赤入心取之以保心氣佐以龍牡者取水族之物以制火邪取重鎮之品以治浮越也芍藥苦平非亡陽所宜故去之蜀漆取通泄陽熱故先煮之神氣生於中焦水穀之精故用甘草大棗生薑以資助中焦之氣也病在陽復以火劫此為逆也故曰救逆桂枝加桂湯治燒針令其汗針處被寒核起而赤者必發奔豚氣從小腹上衝心灸其核上各一壯與此方主之桂枝五兩芍藥三兩生薑三兩甘草二兩大棗十二枚上五味以水七升煮取三升去滓溫服一升按本論云與桂枝加桂湯更加桂二兩而不知原用三兩更加二兩即名此湯非於五兩之外更加也歌曰氣從臍逆號奔豚汗為燒針啓病源只取桂枝湯本味再加二兩桂枝論蔚按少陰上火而下水太陽病以燒針令其汗汗多傷心火衰而水乘之故發奔豚用桂枝加桂使桂枝得盡其量上能保少陰之火臟下能溫少陰之水臟一物而兩扼其要也核起而赤者針處被寒灸以除其外寒並以助其心火也桂枝甘草龍骨牡蠣湯治火逆下之因燒針煩躁者此湯主之桂枝一兩甘草二兩龍骨二兩牡蠣二兩上四味以水五升煮取二升半去滓溫服八合日三服歌曰二甘一桂不雷同龍牡均行二兩通火逆下之煩躁起交通上下取諸中蔚按太陽病因燒針而為火逆者多今人不用燒針而每有火逆之證者炮薑桂附荊防羌獨之類逼其逆也火逆則陽亢於上若遽下之則陰陷於下陽亢於上不能遇陰而煩陰陷於下不得遇陽而躁故取龍牡水族之物抑亢陽以下交於陰取桂枝辛溫之品啓陰氣以上交於陽最妙在甘草之多資助中焦使上下陰陽之氣交通於中土而煩躁自平也抵當湯治太陽病熱在下焦小腹硬滿下血乃愈所以然者以太陽隨經瘀熱在裡故也此湯主之虻蟲三十個去足翅熬水蛭三十個熬大黃三兩酒洗桃仁三十個上四味銼如麻豆以水五升煮取三升去滓溫服一升不下再服歌曰大黃三兩抵當湯里指任沖不指胱虻蛭桃仁各三十攻其血下定其狂張令韶曰太陽有經與氣之分亦有外與表之別桃仁承氣證熱結膀胱乃太陽肌腠之邪從背膂而下結於膀胱故曰外不解者尚不可攻肌腠為外也抵當證瘀熱在裡乃太陽膚表之邪從胸中而下結於小腹表氣通於胸故曰表證仍在反不結胸皮毛為表也蓋太陽之氣從胸而出入太陽之經循背膂而下絡膀胱經病外邪從背而入結於膀胱者詳於桃仁承氣湯方注而氣病表邪從胸而入不涉於膀胱故不曰熱結膀胱而曰反不結胸熱在下焦蓋下焦即胞中衝任二脈之所起也衝脈起於氣衝任脈起於中極之下以上毛際亦居小腹故前章曰小腹急結此章曰小腹硬滿急結者急欲下通之象不必攻之故曰下者愈只用桃仁承氣足矣此曰硬滿全無下通之勢故不曰血自下而曰下血乃愈言必攻而始下也非抵當不可二證之分別如此又曰太陽病六七日正當太陽主氣之期表證仍在脈當浮今微而沉者氣隨經絡沉而內薄也內薄於胸當結胸今反不結胸者知表邪從胸而下入於陰分陰不勝陽故發狂熱在下焦故小腹硬滿硬滿而小便自利便知其不在無形之氣分而在有形之血分也方用虻蟲水蛭一飛一潛吮血之物也在上之熱隨經而入飛者抵之在下之血為熱所瘀潛者當之配桃核之仁將軍之威一鼓而下抵拒大敵四物當之故曰抵當抵當丸治傷寒有熱小腹滿應小便不利今反利者為有血也當下之虻蟲二十個去翅足熬水蛭二十個熬桃仁三十五個大黃三兩上四味搗分為四丸以水一升煮一丸取七合服不可余藥晬時當下血若不下者更服歌曰卅五桃仁三兩黃虻蟲水蛭草枚詳搗丸四個煎宜一有熱尿長腹滿嘗陳修園曰抵當之脈浮取微而沉取結按曰微而沉非沉微也故又以沉結申之抵當之證發狂小腹硬滿小便自利其中又有發黃病審其小便不利為膀胱之氣不化小便自利非膀胱之氣不化為下焦之瘀不行以此方之難用又不可不用不得不重申其義也然此為抵當湯丸二證公共之辨法也師又立抵當丸方法者著眼在有熱二字以熱瘀於裡而仍蒸於外小腹又滿小便應不利而反自利其證較重而治之不可急遽故變湯為丸以和洽其氣味令其緩達病所曰不可余藥者謂連滓服下不可留余庶少許勝多許俟晬時下血病去而正亦無傷也大陷胸丸治結胸證項亦強如柔痓狀下之則和此方主之大黃半斤葶藶子半升熬杏仁半升去皮尖炒黑芒硝半升上四味搗篩二味次內杏仁芒硝合研如脂和散取如彈丸一枚別搗甘遂末一錢匕白蜜二合水二升煮取一升溫頓服之一宿乃下如不下更服取下為效禁如藥法歌曰大陷胸丸法最超半升葶藶杏硝調項強如痓君須記八兩大黃取急消蔚按太陽之脈上循頭項太陽之氣內出於胸膈外達於皮毛其治法宜從汗解今應汗而反下之則邪氣因誤下而結於胸膈之間其正氣亦隨邪氣而內結不能外行於經脈以致經輸不利而頭項強急如柔痓反張之狀取大黃芒硝苦鹹以泄火熱甘遂苦辛以攻水結其用杏仁葶藶奈何以肺主皮毛太陽亦主皮毛肺氣利而太陽之結氣亦解也其搗丸而又納蜜奈何欲峻藥不急於下行亦欲毒藥不傷其腸胃也大陷胸湯治大結胸證脈沉而緊心下痛按之石硬者大黃六兩芒硝一升甘遂一錢匕上三味以水六升先煮大黃取二升去滓內芒硝煮一兩沸內甘遂末溫服一升得快利止後服歌曰一錢甘遂一升硝六兩大黃力頗饒日晡熱潮腹痛滿胸前結聚此方消蔚按大黃芒硝苦鹹之品借甘遂之毒直達胸間之飲邪不專蕩胃中之邪穢也湯與丸分者丸恐下之太急故連滓和蜜服之使留中之邪從緩而下湯恐下之不急取三味之過而不留者蕩滌必盡也陳亮斯曰結胸者結於胸中而連於心下也身之有膈所以遮上下也膈能拒邪則邪但留於胸中膈不能拒邪則邪留胸而及於胃胸胃俱病乃成結胸如胸有邪而胃未受邪則為胸脅滿之半表半裡證如胃受邪而胸不留則為胃家實之陽明病皆非結胸也故必詳辨分明庶無差誤小陷胸湯治小結胸病正在心下按之則痛脈浮滑者主之又治心下結痛氣喘悶者黃連一兩半夏半升洗栝蔞實大者一枚上三味以水六升先煮栝蔞取三升去滓內諸藥煎取二升去滓分溫三服歌曰按而始痛病猶輕與手不可近大結胸證迥別脈絡凝邪心下成曰正在心下上不至心下不及小腹與大結胸證又別夏取半升連一兩栝蔞整個要先烹張令韶曰氣分無形之邪結於胸膈之間以無形而化有形故痛不可按而為大結胸證結於胸中脈絡之間入於有形之經絡而仍歸於無形故正在心下按之則痛而為小結胸證方用黃連以解心下之熱半夏以疏脈絡之結栝蔞延蔓似絡性寒涼而實下行所以導心下脈絡之結熱從下而降也若大結胸證亦用此湯藥不及病多死又曰氣無形者也經有形者也以無形之邪結於胸膈之內故用大黃甘遂輩從有形之腸胃而解結於脈絡之間又用黃連半夏輩從無形之氣分而散此經氣互相貫通之理徐靈胎曰大承氣所下者燥屎大陷胸所下者蓄水此所下者為黃涎涎者輕於蓄水而未成水者也審證之精用藥之切如此文蛤散治病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服文蛤五兩上一味為散以沸湯和一方寸匕服湯用五合歌曰水潠原逾汗法門太陽宜汗而以水潠之肉中粟起水在皮膚更增煩熱鬱而不得去意中思水里有熱還無渴水寒侵於肺文蛤磨調藥不繁男元犀按太陽病不發汗而以水潠之致在表之陽反退卻於內而不得去師取文蛤為散味鹹質燥以滲散其水氣若不瘥者用五苓助脾以轉輸之俾仍從皮膚而散也柯韻伯謂此等輕劑恐難散濕熱之重邪金匱要略云渴欲飲水不止者文蛤散主之又云吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛審證用方則彼用散而此則用湯為宜附文蛤湯文蛤五兩麻黃甘草生薑各三兩石膏五兩杏仁五十枚大棗十二枚水六升煮取二升溫服一升汗出即愈張令韶曰前論內因之水結於胸脅而為大陷胸湯證此論外因之水入於皮膚而肉中粟起或為小結胸證如水寒實於外陽熱卻於內而為虛寒結胸無肌表之熱證者與小陷胸以解其內之熱結白散辛溫可以散水寒之氣總之寒實於外熱卻於內或用苦寒以解內熱或用辛熱以散外寒隨時制宜無不可也白散桔梗三分貝母三分巴豆一分去皮心熬黑研如脂上二味為散內巴豆更於臼中杵之以白飲和服強人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一杯利不止進冷粥一杯原文此下尚有十三句余於淺注全録之此照內臺方及張氏本節之歌曰巴豆熬來研似脂只須一分去聲守成規更加桔貝均三分去聲寒實結胸細辨醫蔚按巴豆辛熱能散寒實而破水飲貝母開胸結桔梗開肺氣不作湯而作散取散以散之之義也進熱粥者助巴豆之熱勢以行之也進冷粥者制巴豆之熱勢以止之也不用水而用粥者藉穀氣以保胃氣之無傷也
