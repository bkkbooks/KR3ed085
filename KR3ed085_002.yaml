body:
  text: 卷一太陽方桂枝湯治自汗惡風頭疼體痛發熱脈浮緩名曰中風方下所言證治照仲景內臺方原文建安許宏集議與傷寒論詳略不同後仿此桂枝三兩去皮桂枝止取梢尖嫩枝內外如一若有皮骨者去之非去枝上之皮也後仿此芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病瘥停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物歌曰項強頭痛汗憎風桂芍生薑三兩同棗十二枚甘二兩解肌還藉粥之功蔚按桂枝辛溫陽也芍藥苦平陰也桂枝又得生薑之辛同氣相求可恃之以調周身之陽氣芍藥而得大棗甘草之甘苦甘合化可恃之以滋周身之陰液師取大補陰陽之品養其汗源為勝邪之本又啜粥以助之取水穀之津以為汗汗後毫不受傷所謂立身於不敗之地以圖萬全也桂枝加葛根湯治太陽病項背強𠘧𠘧反汗出惡風者桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘葛根四兩上六味㕮咀以水一斗煮葛根減二升去上沫內諸藥煮取三升溫服一升覆取微似汗不須啜粥余如桂枝將息及禁忌法歌曰葛根四兩走經輸太陽之經輸在背項背𠘧𠘧反汗濡邪之中人始於皮膚次及肌絡次及經輸邪在經輸則經輸實而皮毛虛故反汗出而惡風只取桂枝湯一料加來此味妙相須一本芍藥減去一兩張令韶曰桂枝湯解肌加葛根以宣通經絡之氣蓋葛根入土最深其藤延蔓似絡故能同桂枝直入肌絡之內而外達於膚表也桂枝加附子湯治太陽發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝湯原方加附子一枚炮去皮破八片上六味㕮咀以水七升煮取三升去渣溫服一升歌曰汗因過發漏漫漫肢急常愁伸屈難尚有尿難風又惡桂枝加附一枚安男元犀按太陽之臟即是少陰太陽病本宜發汗發之太過而為漏不止必用附子以固之重至肢厥必用四逆輩以救之若惡風小便難四肢微急難以屈伸者皆汗出過多脫液尚喜腎中之真陽未亡只用附子大補少陰之氣得桂枝湯為太陽之專藥令陰交於陽則漏止漏止則液不外脫而諸證俱除矣桂枝去芍藥湯治太陽病下之後脈促胸滿者桂枝湯原方去芍藥上四味以水七升煮取三升溫服一升桂枝去芍藥加附子湯治同前更加微寒者即前方加附子一枚炮去皮破八片上五味㕮咀以水七升煮取三升去滓溫服一升惡寒止停後服歌曰桂枝去芍義何居胸滿陰彌要急除若見惡寒陽不振更加附子一枚俱蔚按傷寒論大旨以得陽則生上節言汗之遂漏慮其亡陽此節言下後脈促胸滿亦恐亡陽蓋太陽之氣由至陰而上於胸膈今因下後而傷胸膈之陽斯下焦濁陰之氣僭居陽位而為滿脈亦數中一止而為促治宜急散陰霾於桂枝湯去芍藥者恐其留戀陰邪也若見惡寒為陽虛已極徒抑其陰無益必加熟附以壯其陽方能有濟喻嘉言程扶生之解俱誤桂枝麻黃各半湯治太陽病得之八九日過經如瘧狀與往來寒熱不同故曰如瘧發熱惡寒現出太陽經真面目熱多寒少太陽以陽為主熱多是主勝客負為將解之兆其人不嘔邪不轉屬少陰清便欲自可邪不轉屬陽明一日二三度發瘧之寒熱有定候此則或二或三無定候也太陽之陽氣有權則邪氣有不能自容之象脈微緩者微則邪衰緩則正復為欲愈也自起句至此為一節言邪輕欲自解不藥可愈也脈微上節以微與緩對舉此節但云微而不云緩者以邪衰而正亦衰也而惡寒者上節以發熱惡寒對舉此節但云惡寒不云發熱便是大眼目處且熱多寒少為主勝客負之兆若寒多熱少即為客勝主負之兆況但寒無熱之證乎此陰陽俱虛陰陽認作氣血則誤甚要知太陽以陽為主今脈微即露出少陰之沉細象惡寒即露出少陰之厥冷及背惡寒象不獨太陽虛即少陰亦虛也陰陽指太少言最切不可更發汗更吐更下也自脈微至此句為一節提出虛字便可悟芍藥甘草附子湯之法又可悟四逆湯及附子湯之法矣師不出方即引而不發之道面色反有熱色者反字是大眼目言脈微惡寒面色不宜有熱色今反見熱色者以其人陰陽雖曰俱虛而陽氣尚能鼓鬱熱之氣而見於面色未欲解也欲字可味太陽以陽為主猶幸陽氣未敗尚能鼓過經之邪見於面色獨恨陽氣已虛不能遂其所欲令作小汗而解以其不得小汗出身必癢申上未欲解意辨面色之熱兼徵之周身作癢宜桂枝麻黃各半湯邪欲出而不能自出故藉此方以助之自面有熱色至此又是一節通章以太陽病得之八九日一句為主言過經之病也下分三節節節相承一層剝起一層自有注傷寒論以來千百餘年無有一人道及今特詳注之桂枝一兩十六銖芍藥一兩生薑一兩甘草一兩炙麻黃一兩去節大棗四枚杏仁二十四枚湯浸宜去皮尖及兩仁者後仿此上七味以水五升先煮麻黃一二沸去上沫納諸藥煮取一升八合去渣溫服六合歌曰桂枝一兩十六銖甘芍薑麻一兩符杏草四枚棗四粒面呈熱色癢均驅蔚按內臺載此方即桂枝湯原方分兩加麻黃三兩杏仁七十個白水煎服取微汗許宏方議云桂枝湯治表虛麻黃湯治表實二者均曰解表霄壤之異也今此二方合而用之乃解其表不虛不實者也桂枝二麻黃一湯治太陽病若形如瘧日再發汗出必解桂枝一兩十七銖芍藥一兩六銖麻黃十六銖生薑一兩六銖杏仁十六個甘草一兩二銖大棗五枚上七味以水五升先煮麻黃一二沸去上沫內諸藥煮取二升去渣溫服一升日再歌曰一兩六銖芍與薑麻銖十六杏同行桂枝一兩銖十七草兩二銖五棗匡蔚按服桂枝湯宜令微似汗若大汗出脈洪大為汗之太驟表解而肌未解也仍宜與桂枝湯以啜粥法助之若形似瘧日再發者是肌邪表邪俱未淨宜桂枝二以解肌邪麻黃一以解表邪白虎加人參湯治發汗後熱不退大煩渴飲水者知母六兩石膏一斤碎綿裹甘草二兩炙粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服歌曰服桂渴煩大汗傾液亡肌腠涸陽明膏斤知六參三兩二草六粳米熟成蔚按上節言服桂枝大汗出而邪反不能淨宜仍服桂枝以發汗之或桂枝二麻黃一湯合肌表而並汗皆所以竭其餘邪也此節言大汗出外邪已解而汗多亡陽明之津液胃絡上通於心故大煩陽明為燥土故大渴陽氣盛故脈洪大主以石膏之寒以清肺知母之苦以滋水甘草粳米之甘人參之補取氣寒補水以制火味甘補土而生金金者水之源也桂枝二越婢一湯治太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗此湯主之桂枝十八銖芍藥十八銖麻黃十八銖甘草十八銖大棗四枚生薑一兩二銖石膏二十四銖上七味㕮咀以水五升煮麻黃一二沸去上沫納諸藥煎取二升去滓溫服一升本方當裁為越婢湯桂枝湯合飲一升今合為一方桂枝二越婢一歌曰桂芍麻甘十八銖生薑一兩二銖俱膏銖草四四枚棗要識無陽旨各殊論中無陽二字言陽氣陷於陰中既無表陽之證不可發其表汗故用越婢湯方中石膏質重而沉滯同麻黃之勇直入於裡陰之中還同桂枝湯復出於肌表而愈蔚按本方分兩甚輕大抵為邪氣輕淺者設也太陽以陽為主所云熱多寒少是陽氣欲勝陰邪之兆所云脈微弱是指脈不緊盛所云無陽不可發汗是指此證此脈無陽邪之太盛不可用麻黃湯發其汗只用此湯清疏營衛令得似汗而解也書中陰陽二字有指氣血而言有指元陰元陽而言有指腑臟而言有指表裡而言有指寒熱而言有指邪正而言非細心如發者每致誤解即高明如程扶生輩亦以無陽二字認為陽氣虛少甚矣讀書之難也桂枝去桂加茯苓白朮湯治服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者芍藥三兩甘草二兩炙生薑三兩茯苓三兩白朮三兩大棗十二枚上六味以水八升煮取三升去滓溫服一升小便利則愈歌曰術芍苓薑三兩均棗須十二效堪珍炙甘二兩中輸化水利邪除立法新蔚按上節言太陽之氣內陷於脾而不能外達此節言太陽之氣內陷於脾而不能轉輸也用桂枝湯後而頭痛項強翕翕發熱無汗之證仍在其病機在於無汗二字知桂枝湯之不能絲絲入扣也或者悔桂枝湯之誤而下之無如表證悉具轉因誤下而陷於脾以致心下滿微痛小便不利其病機在於小便不利四字桂枝之長於解肌不長於利水服五苓散多飲暖水以出汗師有明訓知桂枝之不可不去也太陽之氣陷於中土心下為脾之部位故滿而微痛脾不能轉輸其津液故小便不利今用桂枝湯去桂而加白朮茯苓則轉輸靈而小便自利小便利而太陽之氣達於內外而內外之邪俱淨矣又按經方分兩輕重變化難言有方中以分兩最重為君者如小柴胡湯柴胡八兩餘藥各三兩之類是也有方中數味平用者如桂枝湯芍桂生薑各三兩而以桂枝為君是也有一方各味等分者如豬苓湯各味俱一兩而以豬苓為君是也有方中分兩甚少而得力者如甘草附子湯中為使之桂枝四兩而所君之甘草只二兩是也又如炙甘草湯中為使之地黃一斤而所君之炙甘草只四兩是也然此雖輕重莫測而方中有是藥而後主是名未有去其藥而仍主其名主其名即所以主其功如此證頭項強痛翕翕發熱為太陽桂枝證仍在因其誤治遂變其解肌之法而為利水水利則滿減熱除而頭項強痛亦愈主方在無藥之處神乎其神矣甘草乾薑湯治誤汗煩躁吐逆而厥者主之甘草四兩乾薑二兩炮上㕮咀以水三升煮取一升五合去渣分溫再服歌曰心煩火盛腳急熱盛灼筋理須明攻表誤行厥便成二兩炮薑甘草四熱因寒用奏功宏蔚按誤服桂枝湯而厥其為熱厥無疑何以又用甘草乾薑乎而不知此方以甘草為主取大甘以化薑桂之辛熱乾薑為佐妙在炮黑變辛為苦合甘草又能守中以復陽也論中乾薑俱生用而惟此一方用炮須當切記或問亡陽由於辛熱今乾薑雖經炮帶些苦味畢竟熱性尚存其義何居答曰此所謂感以同氣則易入也子能知以大辛回陽主薑附而佐以膽尿之妙便知以大甘復陽主甘草而佐以乾薑之神也推之殭蠶因風而死取之以治中風驢為火畜大動風火以伏流之阿水造膠遂能降火而熄風皆古聖人探造化之微也仲景又以此湯治肺痿更為神妙後賢取治吐血蓋學古而大有所得也芍藥甘草湯治誤汗傷血厥逆腳攣急主之芍藥四兩甘草四兩炙上二味㕮咀以水三升煮取一升半去滓分溫再服之歌曰芍甘四兩各相均兩腳拘攣病在筋陽旦誤投熱氣爍苦甘相濟即時伸蔚按芍藥味苦甘草味甘苦甘合用有人參之氣味所以大補陰血血得補則筋有所養而舒安有拘攣之患哉時醫不知此理謂為戊己湯以治腹痛有時生熟並用且雲中和之劑可治百病凡病人素溏與中虛者服之無不增劇誠可痛恨調胃承氣湯治汗後惡熱譫言心煩中滿脈浮者主之大黃四兩去皮酒洗甘草二兩炙芒硝半升上三味㕮咀以水三升煮取一升去滓內芒硝更上火微煮令沸少少溫服之歌曰調和胃氣炙甘功硝用半升地道通草二大黃四兩足法中之法妙無窮蔚按此治病在太陽而得陽明之陽盛證也經曰熱淫於內治以鹹寒火淫於內治以苦寒君大黃之苦寒臣芒硝之鹹寒而更佐以甘草之甘緩硝黃留中以泄熱也少少溫服亦取緩調之意次男元犀按調胃承氣湯此證用之可救服桂枝遺熱入胃之誤太陽之陽盛證用之能泄肌熱以作汗陽明證用之能調胃氣以解微結內臺方自注云脈浮者三字大有意義四逆湯治下利清穀三陰厥逆惡寒脈沉而微者此方主之此乃溫經救陽之峻劑也甘草二兩炙乾薑一兩半附子一枚生用去皮切八片上三味㕮咀以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩歌曰生附一枚兩半薑草須二兩少陰方建功薑附如良將將將從容藉草匡蔚按四逆湯為少陰正藥此證用之以招納欲散之陽太陽用之以溫經與桂枝湯同用以救里太陰用之以治寒濕少陰用之以救元陽厥陰用之以回薄厥次男元犀按生附子乾薑徹上徹下開闢群陰迎陽歸舍交接十二經為斬旗奪關之良將而以甘草主之者從容籌劃自有將將之能也
