body:
  text: 卷五陽明方大承氣湯治陽明病大實大滿大便不通腹痛大熱其脈沉實者此方主之此內臺方原文與傷寒論大同小異芒硝三合內臺方三兩大黃四兩酒洗枳實五枚炙厚朴半斤去皮炙上四味以水一斗先煮枳樸取五升去滓內大黃煮取二升去滓內芒硝更上微火一兩沸分溫再服得下余勿服歌曰大黃四兩樸半斤枳五硝三急下云樸枳先熬黃後入去渣硝入火微熏蔚按承氣湯有起死回生之功惟善讀仲景書者方知其妙俗醫以滋潤之脂麻油當歸火麻仁郁李仁肉蓯蓉代之徒下其糞而不能盪滌其邪則正氣不復不能大瀉其火則真陰不復往往死於糞出之後於是咸相戒曰潤腸之品且能殺人而大承氣湯更無論矣甚矣哉大承氣湯之功用盡為那庸耳俗目所掩也張隱菴曰傷寒六經止陽明少陰有急下證蓋陽明秉悍熱之氣少陰為君火之化在陽明而燥熱太甚緩則陰絕矣在少陰而火氣猛烈勿戢將自焚矣非腸胃之實滿也若實在腸胃者雖十日不更衣無所苦也仲師所云急下六證若究省不到不敢急下致病此者鮮有能生之且予嘗聞之曰痞滿燥實堅五證皆備然後可下噫當下者全不在此五證小承氣湯治陽明病潮熱大便難脈沉而滑及內實腹痛者此方主之內臺方原文大黃四兩厚朴二兩炙去皮枳實三枚炙上三味以水四升煮取一升二合去滓分溫二服初服湯當更衣不爾者盡飲之若更衣者勿服之歌曰樸二枳三四兩黃小承微結好商量長沙下法分輕重妙在同煎切勿忘男元犀按三承氣俱陽明之正方調胃承氣其方已載於太陽篇故不復列傷寒論云陽明病不吐不下心煩者可與調胃承氣湯言陽明病者胃不和也言不吐不下者胃不虛也胃絡上通於心陽明之燥火與少陰之君火相合故心煩可與此湯解見太陽本方下至於大承氣取急下之義陽明譫語潮熱胃中有燥屎五六枚及二陽並病潮熱及陽明下後心中懊憹而煩胃有燥屎及大下後六七日不大便煩不解腹滿痛此有燥屎及少陰證口燥咽乾或自利清水色純青等證俾奏功於頃刻小承氣取微和胃氣勿令大泄下之義陽明病熱未潮大便不硬恐有燥屎少與此湯轉矢氣者可與大承氣攻之若不轉矢氣者不與及太陽病吐下發汗微煩小便數大便因硬者令邪去而正不傷論中逐條俱有深義張令韶云胃與大腸小腸交相貫通者也胃接小腸小腸接大腸胃主消磨水穀化其精微內灌溉於臟腑外充溢於皮毛其糟粕下入於小腸小腸受其糟粕復加運化傳入於大腸大腸方變化傳道於直腸而出故曰小腸者受盛之官化物出焉大腸者傳道之官變化出焉是大承氣者所以通泄大腸而上承熱氣者也故用樸實以去留滯大黃以滌腐穢芒硝上承熱氣小承氣者所以通泄小腸而上承胃氣者也故曰微和胃氣是承製胃府太過之氣者也不用芒硝而亦名承氣者以此若調胃承氣乃調和胃氣而上承君火之熱者也以未成糟粕故無用枳樸之消留滯此三承氣之義也承者制也謂制其太過之氣也故曰亢則害承乃制柯韻伯曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小有二義焉厚朴倍大黃是氣藥為君名大承氣大黃倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大泄下也味寡性緩制小其服欲微和胃氣也大小之分以此且煎法更有妙義大承氣用水一斗煮枳樸取五升內大黃再煮取二升去滓內芒硝何哉蓋生者氣銳而先行熟者氣鈍而和緩仲景欲使芒硝先化燥屎大黃繼通地道而後枳樸除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見微和之義也按張憲公云承者以卑承尊而無專成之義天尊地卑一形氣也形統於氣故地統於天形以承氣故地以承天胃土也坤之類也氣陽也干之屬也胃為十二經之長化糟粕運精微而成傳化之府豈專以塊然之形亦惟承此乾行不息之氣耳湯名承氣確有取義非取順氣之義也憲公此解超出前人惜其所著傷寒類疏未刊行世憲公諱孝培古吳人也豬苓湯治渴欲飲水小便不利脈浮發熱者主之豬苓一兩茯苓一兩澤瀉一兩滑石一兩阿膠一兩上五味以水四升先煮四味取二升去滓內阿膠烊消溫服七合日三服歌曰澤膠豬茯滑相連咳嘔心煩渴不眠煮好去渣膠後入育陰利水法兼全述此湯與五苓之用有天淵之別五苓散治太陽入本太陽司寒水故加桂以溫之是暖腎以行水也此湯治陽明少陰結熱二經兩關津液惟取滋陰以行水蓋傷寒表證最忌亡陽而裡熱又患亡陰亡陰者亡腎中之陰與胃之津液也若過於滲利則津液反致耗竭方中阿膠即從利水中育陰是滋養無形以行有形也故仲景云汗多胃燥雖渴而里無熱者不可與也蜜煎導方治陽明病自汗出若發汗小便自利者此為津液內竭也大便雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導也內臺方原文蜜七合上一味於銅器內微火煎之稍凝如飴狀攪之勿令焦著欲可丸並手捻作挺令頭銳大如指長二寸許當熱時急作冷則硬以內穀道中以手急抱欲大便時乃去之著字正韻直略切黏也豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出宿食惡物甚效原本無宿食一句近本增之必有所據歌曰蜜煎熟後樣如飴溫納肛門法本奇更有醋調膽汁灌外通二法審誰宜蔚按津液內竭便雖硬而不宜攻取蜜之甘潤導大腸之氣下行若熱結於下取豬為水畜以制火膽為甲木以制土引以苦酒之酸收先收而後放其力始大其宿食等有形之物一下而無形之熱亦盪滌無餘矣按內臺方云將蜜於銅器內微火煎之稍凝似飴狀攪之勿令焦滴水中堅凝可用蘸皂角末捻作挺以豬膽汁或油潤穀道內之少頃欲大便乃去之又豬膽汁方以豬膽汁二枚以小竹管插入膽口留一截用油潤內入穀道中以手將膽捻之其汁自內出一食頃當大便下又用土瓜根削如指狀蘸豬膽汁內入穀道中亦可用茵陳蒿湯治陽明病發熱汗出此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴欲飲水漿者此為瘀熱在裡身必發黃此方主之又傷寒七八日身黃如橘子色小便不利腹微滿者此方主之茵陳蒿六兩梔子十四枚大黃二兩去皮上三味以水一斗先煮茵陳減六升內二味煎取三升去滓分溫三服小便當利尿如皂角汁色狀正赤一宿腹減黃從小便去也歌曰二兩大黃十四梔茵陳六兩早煎宜身黃尿短腹微滿解自前陰法最奇柯韻伯曰太陽陽明俱有發黃證但頭汗出而身無汗則熱不得外越小便不利則熱不得下利故瘀熱在裡而發黃按太陽之發黃乃太陽之標陽下合太陰之濕氣陽明之發黃亦陽明之燥熱內合太陰之濕化若止病本氣不合太陰則不發黃故曰太陰者身當發黃若小便自利者不能發黃也張令韶之說最妙然里有不同肌肉是太陽之裡當汗而發之故用麻黃連翹赤小豆湯按柯韻伯移此方於太陽篇亦有見解然原本系是陽明聖經必不可擅改心胸是太陽之裡陽明之表當寒以勝之故用梔子柏皮湯乃清火法腸胃是陽明之裡當瀉之於內故立本方是逐穢法茵陳稟北方之色經冬不凋傲霜凌雪遍受大寒之氣故能除熱邪留結率梔子以通水源大黃以調胃實令一身內外瘀熱悉從小便而出腹滿自減腸胃無傷乃合引而竭之之法此陽明利水之聖劑也又按仲景治陽明渴飲有三法太陽篇之五苓散微發汗以散水氣者不與焉若大渴煩躁小便自利者白虎湯加參清火而生津脈浮發熱小便不利者豬苓湯滋陰以利水若小便不利而發黃腹滿者茵陳湯以泄熱令黃從小便出病情治法胸有成竹矣竊思仲景利小便必用氣化之品通大便必用承氣之品以小便由於氣化也茲小便不利不用二苓者何本論云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利小便故也須知陽明汗出多而渴者不可用則汗不出而渴者津液先虛更不可用明矣此主以推陳致新之茵陳佐以屈曲下行之梔子不用枳樸以承氣與芒硝之峻利則大黃但能潤腸泄熱緩緩而行故必一宿而腹始減黃從小便去而不由大腸去仲景立法之奇匪夷所思耳麻仁丸治趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約此方主之麻仁二升芍藥半斤枳實半斤炙大黃一斤去皮厚朴一尺去皮炙杏仁一升去皮尖熬研作脂上六味為末煉蜜為丸如梧桐子大飲服十丸漸加以知為度歌曰一升杏子二升麻枳芍半斤效可誇黃樸一斤丸飲下緩通脾約是專家一本厚朴亦是一斤男元犀按脾為胃行其津液也今胃熱而津液枯脾無所行而為窮約故取麻仁杏仁多脂之物以潤燥大黃芍藥苦泄之藥以破結枳實厚朴順氣之藥以行滯以蜜為丸者治在脾而取緩欲脾不下泄其津液而小便數已還津液於胃中而大便難已也蔚按古今權量尺寸不同考之內臺方麻仁四兩杏仁六兩芍藥枳實各二兩厚朴三兩大黃八兩蜜丸如梧桐子大熟水下五十丸梔子柏皮湯治傷寒身發黃發熱梔子十五枚甘草一兩黃柏二兩上三味以水四升煮取一升半去滓分溫再服歌曰里郁業經向外驅身黃髮熱四言規身黃髮熱之外無他證草須一兩二黃柏十五枚梔不去皮麻黃連翹赤小豆湯治傷寒瘀熱在裡身必發黃此湯主之麻黃二兩去節連翹二兩赤小豆一升甘草二兩生梓白皮一升一本一斤內臺三兩杏仁四十枚去皮尖大棗十二枚生薑二兩上八味以潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升去滓分溫三服半日服盡歌曰黃病姜翹二兩麻一升赤豆梓皮誇棗須十二能通竅四十杏仁二草嘉蔚按梔子柏皮湯治濕熱已發於外止有身黃髮熱而無內瘀之證此治瘀熱在裡迫其濕氣外蒸而為黃也麻黃能通泄陽氣於至陰之下以發之加連翹梓皮之苦寒以清火赤豆利水以導濕杏仁利肺氣而達諸藥之氣於皮毛薑棗調營衛以行諸藥之氣於肌腠甘草奠安太陰俾病氣合於太陰而為黃者仍助太陰之氣使其外出下出而悉去也潦水者雨後水行洿地取其同氣相求地氣升而為雨亦取其從下而上之義也少陽方小柴胡湯方本論無方此方列於太陽篇中今補其方名論以口苦咽乾目眩為提綱言少陽之上相火主之少陽為甲木諸風掉眩皆屬於木主風主火言少陽之氣化也論云少陽中風兩耳無所聞目赤胸中滿而煩不可吐下吐下則悸而驚此言少陽自受之風邪也論云脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸此言少陽自受之寒邪也論云本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯此邪從太陽轉屬仍達太陽之氣從樞以外出也論云若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之此言當審汗吐下溫針四者之逆而救之也少陽未列專方當於太陽陽明篇求之太陰方論云太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必心下結硬此總論太陰氣之為病也論又云太陰病脈浮可發汗宜桂枝湯論云自利不渴者屬太陰也其臟有寒故也當溫之宜四逆輩此二節言太陰病在外者宜桂枝以解肌在內者不渴無中見之燥化屬本臟有寒宜四逆輩曰輩者理中湯丸等溫劑俱在其中也論云傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也此言太陰寒證外亦有熱證也經云太陰之上濕氣主之中見陽明若不得中見之化則為臟寒之病若中見太過濕熱相併又為發黃之證小便自利者不發黃至七八日驟得陽熱之化故暴煩陰濕在內故下利然下利雖甚亦當自止所以然者以太陰中見熱化脾家實倉廩之腐穢當自去也論云本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛桂枝加大黃湯主之此言誤下轉屬之證也又云太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃弱易動故也此承上節脾家實宜芍藥大黃以行腐穢而脈弱者大便陸續而利出宜減芍藥大黃以存胃氣甚矣傷寒之治首重在胃氣也桂枝加芍藥湯治太陽病反下之因而腹滿時痛者桂枝三兩芍藥六兩甘草二兩生薑三兩大棗十二枚上五味以水七升煮取三升去滓分溫三服桂枝加大黃湯治太陽病反下之因而大實痛者即前方加大黃二兩歌曰桂枝倍芍轉輸脾泄滿升邪止痛宜大實痛因反下誤黃加二兩下無疑述桂枝加芍藥湯倍用芍藥之苦降能令桂枝深入於至陰之分舉誤陷之邪而腹痛自止桂枝加大黃者以桂姜升邪倍芍藥引入太陰鼓其陷邪加大黃運其中樞通地道去實滿棗草助轉輸使其邪悉從外解下行各不相背少陰方論云少陰之為病脈微細但欲寐也此以少陰標本水火陰陽之氣見於脈證者為提綱也內經云少陰之上君火主之又云陰中之陰腎也少陰本熱而標寒上火而下水神之變精之處也論中言少陰自得之病或得太陽之標或得君火之化或得水陰之氣或在於表或在於里或在於經或歸於中土俱明神機樞轉上下出入之至理故其方亦寒熱攻補表裡之不同麻黃附子細辛湯治少陰病始得之反發熱脈沉者此方主之麻黃二兩細辛二兩附子一枚炮上三味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升日三服歌曰麻黃二兩細辛同附子一枚力最雄始得少陰反發熱脈沉的證奏奇功蔚按少陰病始得之是當無熱而反發熱為太陽標陽外呈脈沉為少陰之生氣不升恐陰陽內外不相接故以熟附子助太陽之表陽而內合於少陰麻黃細辛啟少陰之水陰而外合於太陽須知此湯非發汗法乃交陰陽法麻黃附子甘草湯治少陰病得之二三日微發汗以二三日無里證故微發汗也此方主之麻黃二兩附子一枚炮甘草二兩炙上三味以水七升先煮麻黃一兩沸去上沫內諸藥煮取三升去滓溫服一升日三服歌曰甘草麻黃二兩佳一枚附子固根荄少陰得病二三日里證全無汗豈乖蔚按少陰病自始得以至二三日無下利厥逆大寒之裡證又無心中煩不得臥熱化之裡證又無口燥咽乾自利清水腹脹不大便當急下之裡證可知病少陰而得太陽之表熱非汗不解而又恐過汗以傷心腎之真液故於前方去細辛加甘草之補中取中焦水穀之津而為汗則內不傷陰邪從汗解矣須知此湯變交陰陽法為微發汗法黃連阿膠湯治少陰病得之二三日以上心中煩不得臥者主之黃連四兩黃芩一兩芍藥二兩阿膠三兩雞子黃二枚上五味以水六升先煮三物取二升去滓內膠烊盡小冷內雞子黃攪令相得溫服七合日三服歌曰四兩黃連三兩膠二枚雞子取黃敲一芩二芍心煩治更治難眠睫不交男元犀按少陰病但欲寐為提綱此節云心中煩不得臥是但欲寐之病情而變為心中煩可知水陰之氣不能上交於君火也心煩之極而為不得臥可知君火之氣不能下入於水陰也此為少陰熱化之證方中用黃連黃芩之苦寒以折之芍藥之苦平以降之又以雞子黃補離中之氣阿膠補坎中之精俾氣血有情之物交媾其水火斯心煩止而得臥矣此迴天手段附子湯治少陰病一二日口中和其背惡寒者當灸之宜此方主之又少陰病身體痛手足寒骨節痛脈沉者宜此方主之附子二枚生用茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服歌曰生附二枚附子湯術宜四兩主斯方芍苓三兩人參二背冷脈沉身痛詳蔚按論云少陰病得之一二日口中和其背惡寒者當灸之宜此湯此治太陽之陽虛不能與少陰之君火相合也又云少陰病身體痛手足寒骨節痛脈沉者宜此湯此治少陰君火內虛神機不轉也方中君以生附子二枚益下焦水中之生陽以達於上焦之君火也臣以白朮者以心腎藉中土之氣而交合也佐以人參者取其甘潤以濟生附之大辛又佐以芍藥者取其苦降以泄生附之大毒也然參芍皆陰分之藥雖能化生附之暴又恐其掣生附之肘當此陽氣欲脫之頃雜一點陰柔之品便足害事故又使以茯苓之淡滲使參芍成功之後從小便而退於無用之地不遺余陰之氣以妨陽藥也師用此方一以治陽虛一以治陰虛時醫開口輒言此四字其亦知陽指太陽陰指少陰一方統治之理乎桃花湯治少陰病下利便膿血者此湯主之又少陰病二三日腹痛小便不利下利不止便膿血者主之赤石脂一斤一半全用一半篩末乾薑一兩粳米一升上三味以水七升煮米令熟去滓內石脂末方寸匕溫服七合日三服若一服愈余勿服歌曰一升粳米一斤脂脂半磨研法亦奇一兩乾薑同煮服少陰膿血是良規張令韶曰少陰病下利膿血桃花湯主之此感少陰君火之熱不病無形之氣化而病有形之經脈也經謂心之合脈也又謂陰絡傷則便血赤石脂色赤而性澀故能止下利膿血乾薑粳米溫補中焦以資養血脈之源所以治之論又云少陰二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之此言二三日至四五日值太陰主氣之期而脾絡不通則為腹痛脾絡不通不能轉輸則為小便不利小便不利則水穀不分而為利不止陰絡傷則為膿血石脂為山之血脈凝結而成故治經脈之病下節言便膿血可刺者所以申明病在經脈之義也吳茱萸湯治厥陰病乾嘔吐涎沫頭痛者主之又少陰病吐利手足厥冷煩躁欲死者主之又食谷欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也吳茱萸一升洗人參三兩生薑六兩大棗十二枚上四味以水七升煮取二升去滓溫服七合日三服歌曰升許吳萸三兩參生薑六兩救寒侵棗投十二中宮主吐利頭疼煩躁尋蔚按少陰之臟皆本陽明之水穀以資生而復交會於中土若上吐下利則中土大虛中土虛則氣不行於四末故手足逆冷中土虛不能道手少陰之氣而下交則為煩不能引足少陰之氣而上交則為躁甚則煩躁欲死方用吳茱萸之大辛大溫以救欲絕之陽佐人參之沖和以安中氣薑棗和胃以行四末師於不治之證不忍坐視專求陽明是得絕處逢生之妙所以與通脈四逆湯白通加豬膽汁湯三方鼎時也論云食谷欲嘔者屬陽明也吳茱萸湯主之又云乾嘔吐涎沫頭痛者吳茱萸湯主之此陽明之正方也或謂吳茱萸降濁陰之氣為厥陰專藥然溫中散寒又為三陰並用之藥而佐以人參薑棗又為胃陽衰敗之神方昔賢所以有論方不論藥之訓也豬膚湯治少陰病下利咽痛胸滿心煩者主之豬膚一斤上一味以水一斗煮取五升去滓加白蜜一升白粉五合熬香和令相得溫分六服歌曰斤許豬膚鬥水煎水煎減半滓須捐再投粉白粉五合蜜白蜜一升熬香服煩利咽痛胸滿痊張令韶曰此方合下四方皆以少陰主樞旋轉內外無有止息逆則病也夫少陰上火下水而主樞機下利者水在下而火不得下濟也咽痛者火在上而水不得上交也上下水火不交則神機樞轉不出故胸滿神機內郁故心煩豬為水畜膚取其遍達周身從內而外亦從外而內之義也蜜乃稼穡之味粉為五穀之精熬香者取香氣助中土以交合水火轉運樞機者也甘草湯治少陰咽痛者甘草二兩生用上一味以水一升煮取升半去滓分溫再服歌曰甘草名湯咽痛求方教二兩不多收後人只認中焦藥誰識少陰主治優後賢童便隔湯燉服甚見超妙桔梗湯治少陰咽痛與甘草不差者與桔梗湯桔梗一兩甘草二兩上二味以水三升煮取一斤去滓分溫再服歌曰甘草湯投痛未瘥桔加一兩莫輕過奇而不效須知偶好把經文仔細哦述少陰之脈從心系上挾咽二三日乃三陽主氣之期少陰君火外合三陽上循經脈故咽痛甘草生用能清上焦之火而調經脈若不瘥與桔梗湯以開提肺氣不使火氣壅遏於會厭狹隘之地也苦酒湯治少陰咽中傷生瘡不能言語聲不出者主之半夏洗破十四枚雞子一枚去黃上二味內半夏著苦酒中以雞子殼置刀環中安火上令三沸去滓少少含咽之不瘥更作三劑歌曰生夏一枚十四開洗破十四枚雞清苦酒攪幾回刀環捧殼煎三沸咽痛頻吞絕妙哉蔚按一雞子殼之小安能納半夏十四枚之多近刻以訛傳訛即張令韶張隱菴柯韻伯之明亦仍之甚矣耳食之為害也余考原本半夏洗破十四枚謂取半夏一枚洗去其涎而破為十四枚也舊本破字模糊翻刻落此一字以致貽誤至今特正之張令韶曰此治少陰水陰之氣不能上濟君火也君火在上熱傷經絡故咽中傷生瘡經曰諸痛瘡瘍皆屬心火是也在心主言在肺主聲皆由腎間之生氣所出少陰樞機不能環轉而上達故不能語言聲不出也張隱菴有云人之聲音藉陰中之生氣而出半夏生當夏半感一陰之氣而生故能開發聲音破十四枚者七為奇數偶七而成十四是偶中之奇取陰中之生陽也雞卵屬金而白象天肺主金主天助肺以滋水之上源也刀為金器環者還也取金聲環轉之義也苦酒醋也書曰曲直作酸經曰少陽屬腎一以達少陽初生之氣一以金遇木擊而鳴矣火上三沸者金遇火而三伏三伏已過金氣復矣樞轉利水氣升金氣清則咽痛愈而聲音出矣半夏散及湯治少陰咽中痛者主之半夏洗桂枝甘草上三味等分各別搗篩巳合治之白飲和服方寸匕日三服不能散服者以水一升煎七沸內散兩方寸匕更煎三沸下火令少冷少少咽之歌曰半夏桂甘等分施散須寸匕飲調宜若煎少與當微冷咽痛求樞少陰主樞其氣逆於經脈不能環轉四散故咽痛法亦奇蔚按少陰主樞熱氣不能從樞而出逆於經脈而咽痛為甘草湯證寒氣不能從樞而出逆於經脈而咽中痛為半夏散及湯證半夏運樞桂枝解肌甘草緩痛和以白飲者即桂枝湯啜粥之義從中以達外俾內外之經脈通而少陰之樞機出入矣如咽痛不能服散以湯少少咽之取其輕捷即湯亦同於散也白通湯治少陰病下利者此方主之蔥白四莖乾薑一兩附子一枚生用上三味以水三升煮取一升去滓分溫再服白通加豬膽汁湯治少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔而煩者此方主之服湯已脈暴出者死脈微續者生白通湯中加豬膽汁一合人尿五合上如法湯成內豬膽汁人尿和令相得分溫再服若無膽汁亦可用歌曰蔥白四莖一兩姜全枚生附白通湯脈微下利肢兼厥乾嘔心煩膽尿襄人尿五合豬膽汁一合男元犀按白通湯主少陰水火不交中虛不運者也用生附啟水臟之陽以上承於心蔥白引君主之火以下交於腎乾薑溫中焦之土以通上下上下交水火濟中土和利自止矣蔚按白通加豬膽汁湯張令韶之注甚妙令韶謂脈始於足少陰腎主於手少陰心生於足陽明胃誠見道之言少陰下利脈微者腎臟之生陽不升也與白通湯以啟下陷之陽若利不止厥逆無脈乾嘔煩者心無所主胃無所生腎無所始也白通湯三面俱到加膽汁人尿調和後入生氣俱在為效倍速苦鹹合為一家入咽之頃苦先入心即隨鹹味而直交於腎腎得心君之助則生陽之氣升又有附子在下以啟之乾薑從中以接之蔥白自上以通之利止厥回不煩不嘔脈可微續危證必仗此大方也若服此湯後脈不微續而暴出燈光之回焰吾亦無如之何矣通脈四逆湯治少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者此方主之甘草三兩乾薑三兩強人四兩附子一枚生用上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩歌曰一枚生附草姜三招納亡陽此指南外熱裡寒面赤厥脈微通脈法中探一本甘草止用二兩加減歌曰面赤加蔥莖用九腹痛去蔥真好手蔥去換芍二兩加嘔者生薑二兩偶咽痛去芍桔須加桔梗一兩循經走脈若不出二兩參桔梗丟開莫掣肘參各家說陽氣不能運行宜四逆湯元陽虛甚宜附子湯陰盛於下格陽於上宜白通湯陰盛於內格陽於外宜通脈四逆湯蓋以生氣既離亡在頃刻若以柔緩之甘草為君豈能疾呼散陽而使返耶故倍用乾薑而仍不減甘草者恐散渙之餘不能當薑附之猛還藉甘草以收全功也若面赤者虛陽上泛也加蔥白引陽氣以下行腹中痛者脾絡不和也去蔥加芍藥以通脾絡嘔者胃氣逆也加生薑以宣逆氣咽痛者少陰循經上逆也去芍藥之苦泄加桔梗之開提利止脈不出者穀氣內虛脈無所稟而生去桔梗加人參以生脈四逆散治少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者主之甘草枳實柴胡芍藥上四味各十分搗篩白飲和服方寸匕日三服咳者加五味子乾薑各五分並主下利悸者加桂枝五分小便不利者加茯苓五分腹中痛者加附子一枚炮令坼泄利下重者先以水五升煮薤白三升煮取三升去滓以散二方寸匕內湯中煮取一升半分溫再服上一煮字衍文歌曰枳甘柴芍數相均熱厥能回察所因白飲和勻方寸匕陰陽順接用斯神加減歌曰咳加五味與乾薑五分去聲平行為正路下利之病照此加辛溫酸收兩相顧悸者桂枝五分去聲加補養心虛為獨步小便不利加茯苓五分去聲此方為法度腹中痛者裡氣寒炮附一枚加勿誤泄利下重陽郁求薤白三升水煮具水用五升取三升去薤納散寸匕數再煮一升有半成分溫兩服法可悟張令韶曰凡少陰病四逆俱屬陽氣虛寒然亦有陽氣內郁不得外達而四逆者又宜四逆散主之枳實形圓臭香胃家之宜品也所以宣通胃絡芍藥疏泄經絡之血脈甘草調中柴胡啟達陽氣而外行陽氣通而四肢溫矣若咳者肺寒氣逆也用五味乾薑溫斂肺氣並主下利者溫以散之酸以收之也悸者心氣虛也加桂枝以保心氣小便不利者水道不行也加茯苓以行水腹中痛者裡寒也加附子以溫寒泄利下重者陽氣鬱於下也用薤白以通陽氣
