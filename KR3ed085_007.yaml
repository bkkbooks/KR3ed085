body:
  text: 卷六厥陰方烏梅丸治傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為臟寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當吐蛔蛔厥者烏梅丸主之又主久利方烏梅三百枚細辛六兩乾薑十兩黃連一斤蜀椒四兩炒去汗當歸四兩桂枝六兩附子六兩炮人參六兩黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧桐子大先食服十丸日三服稍加至二十丸禁生冷滑物臭食等歌曰六兩柏參桂附辛黃連十六厥陰遵歸椒四兩梅三百十兩乾薑記要真論云厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止此厥陰病之提綱也經云厥陰之上風氣主之中見少陽是厥陰以風為本以陰寒為標而火熱在中也至厥陰而陰已極故不從標本而從於中治沈堯封云此厥陰證之提綱也消渴等證外更有厥熱往來或嘔或利等證猶之陽明病胃家實之外更有身熱汗出不惡寒反惡熱等證故陽明病必須內外證合見乃是真陽明厥陰病亦必內外證合見乃是真厥陰其餘或厥或利或嘔而內無氣上撞心心中疼熱等證皆似厥陰而非厥陰也男元犀按論云傷寒脈微而厥至七八日膚冷其人躁無暫安時者是以少陰證之臟厥喚起厥陰之蛔厥也然少陰證水火不交則為煩躁若真陽欲脫危證則但躁不煩與厥陰之但煩不躁者不同故曰膚冷而躁名曰臟厥非蛔厥也蛔厥為厥陰病的證厥陰陰極陽生中為少陽相火名曰蛔厥此蛔字所包者廣厥陰主風木若名為風厥則遺去木字若名為木厥又遺去風字且用字亦不雅馴若名為風木厥更見執著第以蛔厥二字該之蓋以蛔者風木之蟲也而吐蛔為厥陰之真面目拈此一字而病源病證俱在其中其人當吐蛔者以風木之病當有是證亦不必泥於蛔之有無如本節靜而復煩與上節氣上撞心心中疼熱皆是也曰蛔聞食臭出其人當自吐蛔又用一當字者言吐蛔者其常即不吐蛔而嘔而又煩風木之動亦可以吐蛔例之也曰靜而復煩曰須臾復止曰又煩者風有作止也然通篇之眼目在此為臟寒四字言見證雖曰風木為病相火上攻而其臟則為寒何也厥陰為三陰之盡也周易震卦一陽居二陰之下為厥陰本象病則陽逆於上陰陷於下飢不欲食下之利不止是下寒之確證也消渴氣上撞心心中疼熱吐蛔是上熱之確證也方用烏梅漬以苦酒順曲直作酸之本性逆者順之還其所固有去其所本無治之所以臻於上理也桂椒辛附辛溫之品導逆上之火以還震卦下一畫之奇黃連黃柏苦寒之品瀉心胸之熱以還震卦上四畫之偶又佐以人參之甘寒當歸之苦溫乾薑之辛溫三物合用能令中焦受氣而取汁而烏梅蒸於米下服丸送以米飲無非補養中焦之法所謂厥陰不治取之陽明者此也此為厥陰證之總方注家第謂蛔得酸則靜得辛則伏得苦則下猶淺之乎測烏梅丸也當歸四逆湯治手足厥寒脈細欲絕者此方主之當歸三兩桂枝三兩芍藥三兩細辛三兩大棗二十五枚甘草二兩通草二兩按即今之木通非肆中白松之通草上七味以水八升煮取三升去滓溫服一升日三服當歸四逆加吳茱萸生薑湯治手足厥寒脈細欲絕其人內有久寒者即前方加生薑半斤吳茱萸二升上以水六升清酒六升煮取五升溫分五服歌曰三兩辛歸桂芍行棗須廿五脈重生甘通二兩能回厥寒入吳萸二升姜半斤酒六升烹羅東逸曰厥陰為三陰之盡陰盡陽生若受寒邪則陰陽之氣不相順接故脈微而厥然厥陰之臟相火遊行其間經雖受寒而臟不即寒故先厥者後必發熱所以傷寒初起見其手足厥冷脈細欲絕者不得遽認為寒而用薑附也此方取桂枝湯君以當歸者厥陰主肝肝為血室也佐細辛其味極辛能達三陰外溫經而內溫臟通草其性極通善開關節內通竅而外通榮去生薑者恐其過表也倍大棗者即建中加飴之義用二十五枚者取五五之數也肝之志苦急肝之神欲散辛甘並舉則志遂而神悅未有厥陰神志遂悅而脈微不出手足不溫者也不須參苓之補不用薑附之峻此厥陰厥逆與太少不同治也若其人內有久寒非辛溫之品不能兼治則加吳萸生薑之辛熱更用酒煎佐細辛直通厥陰之臟迅散內外之寒是又救厥陰內外兩傷於寒之法也麻黃升麻湯治傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利吐膿血泄利不止者為難治此方主之麻黃一兩半升麻一兩半當歸一兩知母十八銖黃芩十八銖葳蕤十八銖石膏六銖白朮六銖乾薑六銖芍藥六銖桂枝六銖茯苓六銖甘草六銖天冬六銖上十四味以水一斗先煮麻黃一兩沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈歌曰兩半麻升一兩歸六銖苓朮芍冬依膏薑桂草同分兩十八銖兮芩母萎一本麻黃二兩半升麻當歸各一兩一分宋本麻黃二兩半升麻當歸各一兩六銖有麥門冬無天門冬余俱同張令韶曰傷寒六七日乃由陰出陽之期也粗工以為大熱不解而大下之虛其陽氣故寸脈沉遲手足厥逆也下為陰下部脈不至陰虛不能上通於陽也咽喉不利吐膿血陽熱在上也泄利不止陰寒在下也陰陽兩不相接故為難治與升麻麻黃桂枝以升陽而復以茯苓白朮乾薑調其下利與當歸白芍天冬葳蕤以止膿血與知母黃芩甘草以利咽喉石膏性重引麻黃升麻桂枝直從里陰而透達於肌表則陽氣下行陰氣上升陰陽和而汗出矣此方藥雖駁雜意義深長學者宜潛心細玩可也乾薑黃連黃芩人參湯治傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐者主之乾薑三兩黃連三兩黃芩三兩人參三兩上四味以水六升煮取二升去滓分溫再服歌曰芩連苦降藉姜開濟以人參絕妙哉四物平行各三兩諸凡拒格此方該蔚按傷寒本自寒下者以厥陰之標陰在下也醫復吐下之在下益寒而反格熱於上以致食入即吐方用乾薑辛溫以救其寒芩連苦寒降之且以堅之然吐下之後陰陽兩傷胃氣索然必藉人參以濟之俾胃氣如分金之爐寒熱各不相礙也方名以乾薑冠首者取乾薑之溫能除寒下而辛烈之氣又能開格而納食也家君每與及門論此方及甘草附子湯謂古人不獨審病有法用方有法即方名中藥品之前後亦寓以法善讀書者當讀於無字處也白頭翁湯治熱利下重及下利慾飲水者主之白頭翁二兩黃連三兩黃柏三兩秦皮三兩上四味以水七升煮取二升去渣溫服一升不愈更服一升歌曰三兩黃連柏與秦白頭二兩妙通神病緣熱利時思水下重難通此藥珍蔚按厥陰標陰病則為寒下厥陰中見病則為熱利下重者即經所謂暴注是也白頭翁臨風偏靜特立不撓用以為君者欲平走竅之火必先定搖動之風也秦皮浸水青藍色得厥陰風木之化故用以為臣以黃連黃柏為佐使者其性寒寒能除熱其味苦苦又能堅也總使風木遂其上行之性則熱利下重自除風火不相煽而燎原則熱渴飲水自止霍亂方四逆加人參湯治霍亂惡寒脈微而複利利止亡血也此方主之四逆湯原方加人參一兩歌曰四逆原方主救陽加參一兩救陰方利雖已止知亡血須取中焦變化鄉內經謂中焦取汁變化而赤是謂血方用人參滋中焦之汁非取其回陽也蔚按論云惡寒脈微而複利利止無血也言霍亂既利而複利其證惡寒其脈又微可知陽氣之虛也然脈證如是利雖止而非真止知其血已亡也此亡血非脫血之謂即下則亡陰之義也金匱曰水竭則無血即為津液內竭故以四逆湯救其陽氣又加人參生其津液柯韻伯疑四逆湯原有人參不知仲景於回陽方中迸絕此味即偶用之亦是制熱藥之太過惟救陰方中乃加之韻伯此言可知未嘗夢見本草經也理中丸治霍亂病嘔吐泄利寒多不飲水者人參三兩甘草三兩白朮三兩乾薑三兩上四味搗篩為末蜜和為丸如雞子黃大以沸湯數合和一丸研碎溫服之日三四夜一服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服若臍上築者腎氣動也去朮加桂四兩吐多者去朮加生薑三兩下多者還用術悸者加茯苓二兩渴欲得水者加朮足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去朮加附子一枚服湯後如食頃飲熱粥一升許微自溫勿揭衣被按與服桂枝湯同法可知傷寒不忌食也歌曰吐利腹疼用理中丸湯分兩各三同術姜參草剛柔濟服後還余啜粥功加減歌曰臍上築者白朮忌去朮加桂四兩治吐多白朮亦須除再加生薑三兩試若還下多術仍留輸轉之功君須記悸者心下水氣凌茯苓二兩堪為使渴欲飲水術多加共投四兩五錢餌腹中痛者加人參四兩半兮足前備寒者方內加乾薑其數亦與加參類足前成四兩半腹滿應將白朮刪加附一枚無剩義服如食頃熱粥嘗戒勿貪涼衣被置徐靈胎云桂枝湯之飲熱粥欲其助藥力外散此飲熱粥欲其助藥力以內溫蔚按論云霍亂頭痛發熱身疼痛熱多飲水者五苓散主之寒多不用水者理中丸主之曰霍亂者嘔吐而利也頭痛發熱身疼痛者內霍亂而外傷寒也熱渴者以五苓散助脾土以滋水津之四布寒而不渴者用理中丸理中焦而交上下之陰陽蓋以上吐下利不論寒熱治宜專顧其中也王晉三云人參甘草甘以和陰白朮乾薑辛以和陽辛甘相輔以處中則陰陽自然和順矣此為溫補第一方論中言四逆輩則此湯俱在其中又治大病瘥後喜唾善讀書者於喜唾二字推廣之凡脾胃虛皆是便可悟調理之善方矣程郊倩曰參朮炙草所以固中州乾薑守中必假之焰釜薪而騰陽氣是以谷入於陰長氣於陽上輸華蓋下攝州都五臟六腑皆以受氣矣此理中之旨也通脈四逆加豬膽汁湯治吐以下斷汗出而厥四肢拘急脈微欲絕者此湯主之通脈四逆原方加豬膽汁四合通脈四逆湯煎成內豬膽汁分溫再服其脈即出歌曰生附一枚三兩姜炙甘二兩玉函方此遵宋本金匱玉函經坊刻傷寒論甘草三兩炙脈微內竭吐以下斷津液竭於內也四肢拘急津液竭於內而不榮乎外也資真汁經云中焦受氣取汁又膽為真汁豬膽還加四合襄亦遵玉函經法傷寒論豬膽汁止半合蔚按論云吐以下斷者言陰陽氣血俱虛水穀俱竭無有可吐而自已無有可下而自斷也曰汗出而厥脈微欲絕者無陽氣以主之也曰四肢拘急者無津液以養之也此際若用四逆湯薑附之溫未嘗不可以回陽倍用甘草之甘未嘗不可以滋陰然猶恐其緩而無濟也若用通脈四逆湯倍乾薑之勇似可追返元陽然猶恐大吐大利之餘驟投大辛之味內而津液愈涸外而筋脈愈攣頃刻死矣師於萬死中覓一生路取通脈四逆湯以回其厥以止其汗更佐以豬膽生調取生氣俱在苦先入心而脈復以汁補中焦之汁灌溉於筋則拘急解辛甘與苦甘相濟斯陰陽二氣頃刻調和即四逆加人參湯之意但人參亦無情之草根不如豬膽汁之異類有情生調得其生氣為效倍神也諸家囿於白通加法謂格陽不入借苦寒以從治之堪發一笑按古本只加膽汁無人尿張隱菴注有人尿必有所本讀其註文極有見解張隱菴云此節重言以結上文兩節之意上兩節皆主四逆湯此言氣血皆虛更宜通脈四逆加豬膽人尿以治之不曰吐利止而曰吐以下斷者謂津液內竭吐無所吐下無所下也若吐以下斷如所謂汗出而厥四肢拘急之證仍然不解所謂脈微欲絕之脈依然如故此為陰陽血氣皆虛更宜通脈四逆加豬膽汁湯主之通脈四逆湯解見少陰篇加水畜之甲膽乃起腎臟之精汁上資心主之血更加人尿乃引膀胱之津液還入胃中取精汁內滋而血氣調和之意蓋風雨寒暑之邪直入中焦皆為霍亂若吐利太過而生氣內傷手足厥冷脈微欲絕皆宜四逆湯主之無分寒與暑也何也正氣受傷止救正而不論邪後人補立藿香正氣散以治吐利此治微邪在胃正氣不傷如此之證弗藥亦愈即陰陽湯黃土湯皆能療之若霍亂裡虛古聖止立四逆理中二方為急救正氣之法有謂藿香正氣散治暑霍亂者亦非也愚每見暑月病霍亂四肢逆冷無脈而死藿香正氣不過寬胸解表之劑惡能治之況夏月元氣發泄在外中氣大虛外邪卒至救正猶遲況疏散之劑乎夫邪正相搏有風雨寒暑之分正受邪傷止論正氣之虛實入臟即為不治之死證非風暑為陽而寒雨為陰也此為霍亂之大綱學者宜服膺而勿失高子曰霍亂之證至汗出而厥四肢拘急脈微欲絕乃純陰無陽用四逆湯不必言矣又加膽汁人尿者津液竭而陰血並虛不當但助其陽更當滋益其陰之意每見夏月霍亂之證四肢厥逆脈微欲絕投以理中四逆不能取效反以明礬少許和涼水服之而即愈亦即膽汁人尿之意先賢立法可謂周遍詳明矣陰陽易瘥後勞複方燒褌散治陰陽易上取婦人中褌近隱處剪燒灰以水和服方寸匕日三服小便即利陰頭微腫則愈婦人病取男子中褌燒服歌曰近陰襠褲剪來燒研末還須用水調同氣相求療二易長沙無法不翹翹張隱菴曰褌襠乃陰吹注精之的蓋取彼之餘氣劫彼之餘邪邪毒原從陰入復使之從陰以出故曰小便利陰頭微腫即愈枳實梔子豉湯治大病瘥後勞復者主之若有宿食加大黃枳實三枚炙梔子十四枚香豉一升上三味以清漿水七升空煮取四升內枳實梔子煮取二升下豉更煮五六沸去滓溫分再服覆令微似汗歌曰一升香豉枳三枚十四山梔復病該傷寒論只以大病後勞復者六字該之不著其病形漿水法煎微取汗食停還藉大黃開若有宿食者加大黃如博棋子大五六枚張隱菴曰大病瘥後則陰陽水火始相交會勞其形體則氣血內虛其病復作其證不一故不著其病形只以此方統治之方中梔子清上焦之煩熱香豉啟下焦之水津枳實炙香宣中焦之土氣三焦和立三百九十七法法以方而行方以法而定開千百年之法眼不可專謂為方仲景後此道漸晦至唐賴有孫思邈起而明之著千金方其方俱從傷寒論套出又將傷寒論一一備載不遺惜其字句不無增減章節不無移易又不能闈發其奧蘊徒汲汲於論中各方臨摹脫換以求新異且續刻千金翼以養性補益各立一門遂致後醫以補脾補腎脾腎雙補補氣補血氣血兩補溫補涼補不溫不涼之平補等方迎合於富貴之門鄙陋之習由此漸開究非千金方之過不善讀千金方之過也後學若取其所長棄其所短則千金書何嘗非仲景書之翼也耶千金私淑仲景時有羹牆之見其方託言龍宮秘方蓋以仲景居臥龍岡其傷寒金匱方即為龍宮方老生恆談神明瘁鬼神來告豈其真為神授哉家嚴少孤家徒四壁半治舉子業半事刀圭家日見各醫競尚唐宋各匯方金元劉張朱李四大家以及王宇泰薛立齋張景岳李士材輩濫收各方而為書是有方之書行而無方之書逐廢心甚憫之每欲以家藏各方書付之祖龍而於無方之本經內經難經及祖述伊聖經方之仲景書寢食數十年弗倦自千金以下無譏焉壬子登賢書後寓都門適伊雲林先生患中風證不省人事手足偏廢湯米不入者十餘日都門名醫咸云不治家嚴以二大劑起之名噪一時就診者門外無虛轍後因某當事強令館於其家辭弗就拂其意癸丑秋託病而歸後出宰畿輔恐以醫名蹈癸丑歲之前轍遂絕口不談而猶私自著書嘗語蔚曰三不朽事立言居其一時文詞賦不與焉有人於此若能明仲景之道不為異端末學所亂民不夭札其功德且及於天下後世也前刻公餘醫錄等書皆在保陽官舍而成而傷寒論金匱要略淺注二書稿凡三易自喜其深入顯出自王叔和編次成無己註釋後若存若沒千有餘年至今日方得其真諦與時俗流傳之醫書大有分別所苦者方中分兩輕重煮漬先後分服頓服溫服少冷服等法毫釐間大有千里之判不得不從俗本編為歌括以便記誦命蔚於歌括後各首擬注親筆改易其於蔚之千慮一得處則圈之又圈點之又點意欲大聲疾呼喚醒千百醫於靡靡欲寤中忽然警覺而後快至於金匱方又命弟元犀韻之蔚則仿建安許氏內臺方議體為之逐條立議焉蓋以高年之心不堪多用蔚與弟元犀不過效有事服勞之道非敢輕動筆墨也云爾時嘉慶二十四年歲次己卯冬至後五日也男蔚謹識蔚再按以上擬注及附識一條皆家嚴親自裁定付刻後每欲於注中說未了者續出數條庶無剩義因閱時賢徐靈胎醫書六種其首卷有論六條頗見曉暢蔚可以不必再續也今附錄於後以公同好附錄六首俱徐靈胎著靈胎名大椿江蘇吳江人也方藥離合論方之與藥似合而實離也得天地之氣成一物之性各有功能可以變易血氣以除疾病此藥之力也然草木之性與人殊體入人腸胃何以能如人之所欲以致其效聖人為之制方以調劑之或用以專攻或用以兼治或相輔者或相反者或相用者或相制者故方之既成能使藥各全其性亦能使藥各失其性操縱之法有大權焉此方之妙也若夫按病用藥藥雖切中而立方無法謂之有藥無方或守一方以治病方雖良善而其藥有一二味與病不相關者謂之有方無藥譬之作書之法用筆已工而配合顛倒與夫字形俱備而點畫不成者皆不得謂之能書故善醫者分觀之而無藥弗切於病情合觀之而無方不本於古法然後用而弗效則病之故也非醫之罪也而不然者即偶或取效隱害必多則亦同於殺人而已矣至於方之大小奇偶之法則內經詳言之茲不復贅云古方加減論古人制方之義微妙精詳不可思議蓋其審察病情辨別經絡參考藥性斟酌輕重其於所治之病不爽毫髮故不必有奇品異術而沉痼艱險之疾投之輒有神效此漢以前之方也但生民之疾病不可勝窮若必每病制一方是曷有盡期乎故古人即有加減之法其病大端相同而所現之症或不同則不必更立一方即於是方之內因其現症之異而為之加減如傷寒論中治太陽病用桂枝湯若見項背強者則用桂枝加葛根湯喘者則用桂枝加厚朴杏仁湯下後脈促胸滿者桂枝去白芍湯更惡寒者去白芍加附子湯此猶以藥為加減者也若桂枝麻黃各半湯則以兩方為加減矣若發奔豚者用桂枝為加桂枝湯則又以藥之輕重為加減矣然一二味加減雖不易本方之名而必明著其加減之藥若桂枝湯倍用芍藥而加飴糖則又不名桂枝加飴糖湯而為建中湯其藥雖同而義已別則立名亦異古法之嚴如此後之醫者不識此義而又欲託名用古取古方中一二味則即以某方目之如用柴胡則即曰小柴胡湯不知小柴胡之力全在人參也用豬苓澤瀉即曰五苓散不知五苓之妙專在桂枝也去其要藥雜以他藥而仍以某方目之用而不效不知自咎或則歸咎於病或則歸咎於藥以為古方不可治今病嗟乎即使果識其病而用古方支離零亂豈有效乎遂相戒以為古方難用不知全失古方之精義故與病毫無益而反有害也然則當何如曰能識病情與古方合者則全用之有別症則據古法加減之如不盡合則依古方之法將古方所用之藥而去取損益之必使無一藥之不對症自然不倍於古人之法而所投必有神效矣方劑古今論後世之方已不知幾億萬矣此皆不足以名方者也昔者聖人之制方也推藥理之本原識藥性之專能察氣味之從逆審臟腑之好惡合君臣之配偶而又探索病源推求經絡其思遠其義精味不過三四而其用變化無窮聖人之智真與天地同體非人之心思所能及也上古至今千聖相傳無敢失墜至張仲景先生復申明用法設為問難註明主治之症其傷寒論金匱要略集千聖之大成以承先而啟後萬世不能出其範圍此之謂古方與內經並垂不朽者其前後名家如倉公扁鵲華佗孫思邈諸人各有師承而淵源又與仲景微別然猶自成一家但不能與靈素本草一線相傳為宗支正脈耳既而積習相仍每著一書必自撰方千百唐時諸公用藥雖博已乏化機至於宋人並不知藥其方亦板實膚淺元時號稱極盛各立門庭徒騁私見迨乎前明蹈襲元人緒餘而已今之醫者動云古方不知古方之稱其指不一若謂上古之方則自仲景先生流傳以外無幾也如謂宋元所制之方則其可法可傳者絕少不合法而荒謬者甚多豈可奉為典章若謂自明人以前皆稱古方則其方不下數百萬夫常用之藥不過數百品而為方數百萬隨拈幾味皆已成方何必定云某方也嗟嗟古之方何其嚴今之方何其易其間亦有奇巧之法用藥之妙未必不能補古人之所未及可備參考者然其大經大法則萬不能及其中更有違經背法之方反足貽害安得有學之士為之擇而存之集其大成刪其無當實千古之盛舉余蓋有志而未遑矣古今方劑大小論今之論古方者皆以古方分兩太重為疑以為古人氣體厚故用藥宜重不知此乃不考古而為此無稽之談也古時升斗權衡歷代各有異同而三代至漢較之今日僅十之二余親見漢時有六升銅量容今之一升二合如桂枝湯乃傷寒大劑也桂枝三兩芍藥三兩甘草二兩共八兩二八不過一兩六錢為一劑分作三服則一服藥不過今之五錢三分零他方間有藥品多而加重者亦不過倍之而已今人用藥必十數品各一二錢或三四錢則反用三兩外矣更有無知妄人用四五兩作一劑近人更有用熟地八兩為一劑者尤屬不倫用丸散亦然如古方烏梅丸每服如桐子大二十丸今不過四五分若今人之服丸藥則用三四錢至七八錢不等矣末藥只用方寸匕不過今之六七分今亦服三四錢矣古人之用藥分兩未嘗重於今日周禮遺人凡萬民之食食者人四釜注六斗四升曰釜四釜共二石五斗六升為人一月之食則每日食八升有餘矣而謬說相傳方劑日重即此一端而荒唐若此況其深微者乎蓋既不能思考古又無名師傳授無怪乎每舉必成笑談也煎藥法論煎藥之法最宜深講藥之效不效全在乎此夫烹飪禽魚羊豕失其調度尚能損人況藥專以之治病而可不講乎其法載於古方之末者種種各殊如麻黃湯先煮麻黃去沫然後加余藥同煎此主藥當先煎之法也而桂枝湯又不必先煎桂枝服藥後須啜熱粥以助藥力又一法也如茯苓桂枝甘草大棗湯則以甘瀾水先煎茯苓如五苓散則以白飲和服服後又當多飲暖水小建中湯則先煎五味去渣而後納飴糖大柴胡湯則煎減半去渣再煎柴胡加龍骨牡蠣湯則煎藥成而後納大黃其煎之多寡或煎水減半或十分煎去二三分或止煎一二十沸煎藥之法不可勝數皆各有意義大都發散之藥及芳香之藥不宜多煎取其生而疏泄補益滋膩之藥宜多煎取其熟而停蓄此其總訣也故方藥雖中病而煎法失度其藥必無效蓋病家之常服藥者或尚能依法為之其粗魯貧苦之家安能如法制度所以病難愈也若今之醫者亦不能知之矣況病家乎服藥法論病之愈不愈不但方必中病方雖中病而服之不得其法則非特無功而反有害此不可不知也如發散之劑欲驅風寒出之於外必熱服而暖覆其體令藥氣行於營衛熱氣周遍挾風寒而從汗解若半溫而飲之仍當風坐立或僅寂然安臥則藥留腸胃不能得汗風寒無暗消之理而營氣反為風藥所傷矣通利之藥欲其化積滯而達之於下也必空腹頓服使藥性鼓動推其垢濁從大便解若與飲食雜投則新舊混雜而藥氣與食物相亂則氣性不專而食積愈頑矣故傷寒論等書服藥之法宜熱宜溫宜涼宜冷宜緩宜急宜多宜少宜早宜晚宜飽宜飢更有宜湯不宜散宜散不宜丸宜膏不宜丸其輕重大小上下表里治法各有所當此皆一定之至理深思其義必有得於心也
