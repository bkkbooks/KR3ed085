body:
  text: 卷四太陽方柴胡桂枝湯治傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者此湯主之又發汗多亡陽譫語不可下與柴胡桂枝湯和其營衛以通津液後自愈柴胡四兩黃芩一兩半人參一兩半半夏二合半甘草一兩桂枝一兩半芍藥一兩半生薑一兩半大棗六枚上九味以水七升煮取三升去滓溫服歌曰小柴原方取半煎桂枝湯入復方全生薑大棗甘草二方俱有只取桂枝湯之半須記之七方大小輕重奇偶復陽中太少相因病偏重柴胡作仔肩蔚按小柴胡湯解見本方此言傷寒六七日一經已周又當太陽主氣之期其氣不能從胸而出入結於經脈以及支絡故取桂枝湯以除發熱惡寒藉小柴胡湯以達太陽之氣從樞以轉出柴胡桂枝幹薑湯治傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也此湯主之柴胡半斤桂枝三兩乾薑二兩黃芩三兩牡蠣二兩甘草二兩炙栝蔞根四兩上七味以水一斗二升煮取六升去渣再煎取三升溫服一升日三服初服微煩復服汗出便愈歌曰八柴二草蠣乾薑芩桂宜三括四嘗不嘔渴煩頭汗出少陽樞病要精詳張令韶曰傷寒五六日厥陰主氣之期也厥陰之上中見少陽已發汗而復下之則逆其少陽之樞不得外出故胸脅滿微結不得下行故小便不利少陽之上火氣治之故渴無樞轉外出之機故不嘔但頭汗出者太陽之津液不能旁達惟上蒸於頭也少氣欲樞轉而不能故有往來寒熱之象也厥陰內屬心包而主脈絡故心煩此病在太陽而涉厥陰之氣不得少陽之樞以外出故曰此為未解也用柴胡桂枝黃芩轉少陽之樞而達太陽之氣牡蠣啓厥陰之氣以解胸脅之結蔞根引水液之上升而止煩渴汗下後中氣虛矣故用乾薑甘草以理中半夏瀉心湯治傷寒五六日嘔而發熱者柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖以下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜此湯半夏半升洗黃芩三兩乾薑三兩甘草三兩人參三兩黃連一兩大棗十二枚上七味以水一斗煮取六升去渣再煎取三升溫服一升日三服歌曰三兩姜參炙草芩一連痞證嘔多尋半升半夏棗十二去滓重煎守古針蔚按師於此證開口即云傷寒五六日嘔而發熱柴胡證俱在者五六日乃厥陰主氣之期厥陰之上中見少陽太陽之氣欲從少陽之樞以外出醫者以他藥下之心下滿而硬痛者為結胸但滿而不痛者為痞痞者否也天氣不降地氣不升之義也芩連大苦以降天氣薑棗人參辛甘以升地氣所以轉否而為泰也君以半夏者因此證起於嘔取半夏之降逆止嘔如神亦即小柴胡湯去柴胡加黃連以生薑易乾薑是也古人治病不離其宗如此附結胸臟結痞證辨結胸為陽邪臟結與痞為陰邪但臟結結於下痞結結於上也結於下者感下焦陰寒之氣化結於上者感上焦君火之氣化也十棗湯治太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和此方主之芫花熬甘遂大戟上三味等分各別搗為散以水一升半先煮大棗肥者十枚取八合去渣內藥末強人服一錢匕羸者服半錢匕溫服之平旦服若下少病不除者明目更服加半錢匕得快下利後糜粥自養歌曰大戟芫花甘遂平妙將十棗煮湯行中風表證全除盡裡氣未和此法程蔚按太陽為天天連於水太陽中風風動水氣水氣淫於上則嘔逆水氣淫於下則下利水氣聚於心下則為痞且硬滿引脅而痛也其人漐漐汗出頭痛乾嘔短氣汗出等證宜辨若惡寒為表未解不可攻之若不惡寒為表解而里未和宜用此湯第三味皆辛苦寒毒之品直決水邪大傷元氣柯韻伯謂參術所不能君甘草又與之相反故選十棗以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使穀氣內充一以使邪不復作此仲景用毒攻病之法盡美又盡善也大黃黃連瀉心湯治傷寒大下後復發汗心下痞按之濡其脈關上浮緊者此方主之若有惡寒者表未解也宜先解表然後攻痞大黃二兩黃連一兩上二味以麻沸湯二升漬之須臾絞去滓分溫再服歌曰痞證分歧辨向趨關浮心痞按之濡大黃二兩黃連一麻沸湯調病緩驅蔚按心下痞按之濡而不硬是內陷之邪與無形之氣搏聚而不散也脈浮在關以上其勢甚高是君火亢於上不能下交於陰也此感上焦君火之化而為熱痞也方用大黃黃連大苦大寒以降之火降而水自升亦所以轉否為泰法也最妙在不用煮而用漬僅得其無形之氣不重其有形之味使氣味俱薄能降而即能升所謂聖而不可知之謂神也附子瀉心湯治心下痞而復惡寒汗出者此湯主之大黃二兩黃芩一兩黃連一兩附子一枚炮去皮破別煮取汁上四味切三味以麻沸湯二升漬之須臾絞去滓內附子汁分溫再服愚按麻沸湯漬者微取氣不取其味也歌曰一枚附子瀉心湯一兩連芩二大黃汗出惡寒心下痞專煎輕漬要參詳蔚按心下痞是感少陰君火之本熱也復惡寒者覆呈太陽寒水之本寒也汗出者太陽本寒甚而標陽大虛而欲外撒也治傷寒以陽氣為主此際豈敢輕用苦寒然其痞不解不得不取大黃黃連黃芩之大苦大寒以解少陰之本熱又恐亡陽在即急取附子之大溫以溫太陽之標陽並行不悖分建奇功如此最妙在附子專煮扶陽欲其熟而性重三黃蕩積開痞欲其生而性輕也生薑瀉心湯治傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者此湯主之生薑四兩甘草三兩人參三兩乾薑一兩黃芩三兩半夏半升大棗十二枚黃連一兩上八味以水一斗煮取六升去滓再煎取三升溫服一升日三服歌曰汗余痞證四生薑太陽寒水之邪傷於肌膚之表者從汗而解入於軀殼之裡者不從汗而解芩草人參三兩行一兩乾薑棗十二一連半夏半升量次男元犀按太陽為寒水之經寒水之氣傷於外者可從汗而解之寒水之氣入於裡者不能從汗解之汗出解後而所現之證俱屬水氣用事為本條之的證惟心下痞硬為諸瀉心法統共之證陳平伯云君生薑之辛溫善散者宣泄水氣復以乾薑參草之甘溫守中者培養中州然後以芩連之苦寒者滌熱泄痞名曰生薑瀉心賴以瀉心下之痞而兼擅補中散水之長也倘無水氣必不用半夏生薑之辛散不涉中虛亦無取乾薑參草之補中要知仲景瀉心湯有五然除大黃黃連瀉心湯正治之外皆隨證加減之方也甘草瀉心湯治傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也此方主之甘草四兩黃芩三兩乾薑三兩半夏半升黃連一兩大棗十二枚上六味以水一斗煮取六升去滓再煎取三升溫服一升日三服歌曰下余痞作腹雷鳴甘四姜芩三兩平一兩黃連半升夏棗枚十二擘同烹陳平伯曰心下痞本非可下之實熱但以妄下胃虛客熱內陷上逆心下耳是以胃氣愈虛痞結愈甚夫虛者宜補故用甘溫以補虛客者宜除必藉苦寒以泄熱方中倍用甘草者下利不止完穀不化此非稟九士之精者不能和胃而緩中方名甘草瀉心見泄熱之品得補中之力而其用始神也此伊尹湯液所制治狐惑蝕於上部則聲嗄者方中有人參三兩赤石脂禹餘糧湯治傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦此方主之復利不止者當利其小便赤石脂一斤太一禹餘糧一斤以上二味以水六升煮取二升去滓分三服歌曰赤石餘糧各一斤下焦下利此湯欣理中不應宜斯法爐底填來得所聞張令韶曰石性墜下故以治下焦之利非僅固澀也下焦濟泌別汁而滲入膀胱故利不止者又當利其小便以分別其水穀焉夫心下痞屬上中二焦此復言不特上中二焦不和而成即下焦不和而亦能成痞也柯韻伯曰甘薑參術可以補中宮元氣之虛而不足以固下焦脂膏之脫此利在下焦故不得以理中之劑收功矣然大腸之不固仍責在胃關門之不閉仍責在脾二石皆土之精氣所結實胃而澀腸急以治下焦之標者實以培中宮之本也要知此證土虛而火不虛故不宜於薑附若濕甚而虛不甚復利不止者故又當利小便也又曰凡草木之藥皆稟甲乙之氣總不若稟戊己之化者得同氣相求之義又有爐底補塞之功旋覆代赭湯治汗吐下解後心下痞硬噫氣不除者此方主之旋覆花三兩代赭石一兩人參二兩甘草三兩炙半夏半升生薑五兩大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服按內臺方代赭石五兩半夏止用二兩歌曰五兩生薑夏半升草旋三兩噫堪憑人參二兩赭石一棗十二枚力始勝俞麟州曰此即生薑瀉心湯之變法也夫二條皆有心下痞硬句而生薑瀉心湯重在水氣下趨而作利旋覆代赭湯重在胃虛挾飲水氣上逆而作噫取治水氣下趨而利者必用生薑以散水胃虛挾飲而噫者必用赭石以鎮逆二條對勘益見仲景制方之妙羅東逸云此方治正虛氣不歸元而承領上下之聖方也蓋發汗吐下後邪雖去而胃氣之虧損亦多胃氣既虧三焦亦因之而失職陽無所歸而不升陰無所納而不降是以濁邪留滯伏飲為逆故心下痞硬噫氣不除方中以人參甘草養正補虛薑棗和脾養胃所以定安中州者至矣更以赭石得土氣之甘而沉者使之斂浮鎮逆領人參以歸氣於下旋覆之辛而潤者用之開肺滌飲佐半夏以蠲痰飲於上苟非二物承領上下則何能除噫氣而消心下之痞硬乎觀仲景治下焦水氣上凌振振欲劈地者用真武湯鎮之利在下焦大腸滑脫者用赤石脂禹餘糧湯固之此胃虛於中氣不及下復用此法領之而胸中轉否為泰其為歸元固下之法各極其妙如此桂枝人參湯治太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者此方主之桂枝四兩人參三兩白朮三兩乾薑三兩甘草四兩上五味以水九升先煮四味取五升內桂枝煮取三升去滓溫服一升日再夜一服歌曰人參湯即理中湯加桂後煎痞利嘗桂草方中皆四兩同行三兩術參姜蔚按太陽外證未除而數下之未有不致虛者裡虛則外熱內陷故為協熱利不止協合也同也言但熱不虛但虛不熱皆不足以致此也太陽之氣出入於心胸今太陽主陽之氣因誤下而陷於下則寒水之陰氣反居於陽位故為心下痞硬可與甘草瀉心湯條此非熱結但以胃中虛客氣上逆故使硬句互參方用人參湯以治裡虛桂枝以解表邪而煮法桂枝後納者欲其於治里藥中越出於表以解邪也沈丹彩曰此與葛根黃連湯同一誤下而利不止之證也而寒熱各別虛實對待可於此互參之彼因實熱而用清邪此因虛邪而從補正彼得芩連而喘汗安此得理中而痞硬解彼得葛根以升下陷而利止此藉桂枝以解表邪而利亦止矣瓜蒂散治病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之瓜蒂一分熬黃赤小豆一分上二味各別搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀粥去滓取汁和散溫頓服之不吐者少少加得快吐乃止諸亡血虛家不可與瓜蒂散按內臺方有昏憒者亦不可吐句歌曰病在胸中氣分乖咽喉息礙痞難排平行瓜豆還調豉寸脈微浮湧吐佳蔚按太陽之脈連風府上頭項今云不痛不強者不在經脈也太陽之氣出入於心胸今云胸中痞硬氣上衝咽喉不得息者是邪氣欲從太陽之氣上越也寸脈微浮者氣欲上越之象也然欲越而不能遽越其寒水之氣不在經亦不在表而惟在於胸中故曰胸中寒方取瓜蒂之苦湧佐以赤小豆之色赤而性降香豉之色黑而氣升能使心腎相交即大吐之頃神志不潰此所以為吐法之神也又論云病人手足厥冷脈乍緊者邪在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散諸家解互異惟徐靈胎以邪在胸中陽氣不能四達解之甚為簡妙黃芩湯治太陽與少陽合病自下利者此方主之黃芩三兩甘草二兩炙芍藥二兩大棗十二枚上四味以水一斗煮取三升去滓溫服一升日再夜一服黃芩加半夏生薑湯治太陽與少陽合病不下利而嘔者黃芩三兩甘草二兩炙芍藥二兩半夏半升生薑三兩大棗十二枚上六味以水一斗煮取三升去滓溫服一升日再夜一服歌曰棗枚十二守成針二兩芍甘三兩芩利用本方嘔加味姜三夏取半升斟蔚按仲景凡下利證俱不用芍藥惟此方權用之以泄陷里之熱非定法也張令韶曰此治太陽與少陽合病而下利與嘔也合者彼此合同非如並者之歸併於此也太陽主開少陽主樞太陽不能達樞以外出而反從樞以內陷故下利與黃芩湯清陷里之熱而達太陽之氣於外若嘔者少陽之樞欲從太陽之開以上達也故加半夏生薑宣達其逆氣以助太陽之開黃連湯治傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者此方主之黃連三兩甘草二兩炙乾薑三兩人參二兩桂枝三兩半夏半升大棗十二枚上七味以水一斗煮取五升去滓溫服一升日三夜二服歌曰腹疼嘔吐藉樞能少陽為樞二兩參甘夏半升連桂乾薑各三兩棗枚十二妙層層一本甘草三兩王晉三曰此即小柴胡湯變法以桂枝易柴胡以黃連易黃芩以乾薑易生薑胸中熱嘔吐腹中痛者全因胃中有邪氣阻遏陰陽升降之機故用人參大棗乾薑半夏甘草專和胃氣使入胃之後聽胃氣之上下敷布交通陰陽再用桂枝宣發太陽之氣載黃連從上焦陽分瀉熱不使其深入太陰有礙虛寒腹痛桂枝附子湯治傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者此方主之若其人大便硬小便自利者去桂加白朮湯主之桂枝四兩附子三枚炮大棗十二枚生薑三兩甘草二兩上五味以水六升煮取二升去滓分溫三服歌曰三姜二草附枚三四桂同投是指南大棗方中十二粒痛難轉側此方探此方藥品與桂枝去芍藥加附子湯同但分兩之輕重不同其主治亦別仲景方法之嚴如此桂枝附子去桂加白朮湯按即上方加減故論中雲一方二法白朮四兩甘草二兩附子三枚炮大棗十二枚生薑三兩上五味以水六升煮取二升去滓分溫三服初服其人身如痹半日許復服之三服盡其人如冒狀勿怪此以附子術並走皮內逐水氣未得除故使之爾法當加桂四兩此本一方二法也歌曰大便若硬小便通脈澀虛浮濕勝風即用前方須去桂術加四兩有神功身重痛不能轉側風濕病也前方治風勝於濕此方治濕勝於風蔚按師云傷寒八九日風濕相搏身體疼煩不能自轉側者風濕之邪盛也濕淫於中無上達之勢故不嘔濕為陰邪無陽熱之化故不渴邪盛則正虛故脈浮虛而澀但前方主桂枝為風勝於濕風為天之陽邪主桂枝之辛以化之後方去桂加朮為濕勝於風濕為地之陰邪主白朮之苦以燥之或問苦燥之品不更令大便硬小便自利乎曰太陰濕土喜燥而惡濕濕傷脾土則不能輸其津液以入胃師所以去解表之桂而出補中之術也且濕既去而風亦無所戀而自除經方無不面面周到也甘草附子湯治風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者此方主之甘草二兩白朮二兩桂枝四兩附子二枚炮上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者宜服六七合為始言初服之始歌曰朮附甘兮二兩平桂枝四兩亦須明方中主藥推甘草風濕同驅要緩行宋本金匱玉函經甘草白朮各三兩王晉三曰甘草附子湯兩表兩里之偶藥風淫於表濕流關節治宜兩顧白朮附子顧里勝濕桂枝甘草顧表勝風獨以甘草冠其名者病深關節義在緩而行之若驅之太急風去而濕仍留反遺後患矣白虎湯治發汗後大熱不解多汗出不惡寒大渴能飲水者此方主之按此條從內臺方原文與傷寒論稍異知母二兩石膏一斤碎綿裹甘草二兩炙粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日二服歌曰陽明白虎證辨非難大熱多汗大渴飲水等為陽明證易辨難在陽邪背惡寒論中背惡寒三字兩見一見於少陰證附子湯一見於此湯一寒一熱須辨於釐毫之間為死生大關頭知六膏斤甘二兩米加六合服之安蔚按白虎湯傷寒論凡三見太陽條治脈浮滑厥陰條治脈滑而厥又治三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿等證而原本此方列於太陽條甘草附子湯之下者言外見風寒濕燥火之氣俱括於太陽之內且下一條炙甘草湯亦即潤燥之劑可知傷寒論非止治風寒二氣也柯韻伯曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗自出熱灼胃中故渴欲飲水邪盛而實故脈滑然猶在經故兼浮也蓋陽明屬胃外主肌肉雖有大熱而未成實終非苦寒之味所能治也石膏辛寒辛能解肌熱寒能勝胃火寒性沉降辛能走外兩擅內外之能故以為君知母苦潤苦以瀉火潤以滋燥故以為臣用甘草粳米調和於中宮且能土中瀉火作甘稼穡寒劑得之緩其寒苦藥得之化其苦使沉降之性皆得留連於中也得二味為佐庶大寒之品無傷損脾胃之慮也煎湯入胃輸脾歸肺大煩大渴可除矣白虎為西方金神所以名湯秋金得令而炎暑自解矣炙甘草湯治傷寒脈結代心動悸者主之甘草四兩炙桂枝三兩生薑三兩人參二兩阿膠二兩大棗三十枚麻仁半升麥冬半升生地一斤上九味以清酒七升水八升先煮八味取三升去滓內膠煬消盡溫服一升日三服又名復脈湯歌曰結代脈須四兩甘棗枚三十桂姜三半升麻麥一斤地二兩參膠酒水涵蔚按周禹載云本條不言外證寒熱已罷可知不言內證二便自調可知第以病久正氣大虧無陽以宣其氣更無陰以養其心此脈結代心動悸所由來也方中人參地黃阿膠麥冬大棗麻仁皆柔潤之品以養陰必得桂枝生薑之辛以行陽氣而結代之脈乃復尤重在炙甘草一味主持胃氣以資脈之本原佐以清酒使其捷行於脈道也其煮法用酒七升水八升只取三升者以煎良久方得爐底變化之功步步是法要之師第言結代者用此方以復之非謂脈脫者以此方救之也學者切不可泥其方名致誤危證推之孫真人制生脈散亦因其命名太誇庸醫相沿貽害豈淺鮮哉男元犀按此證必緣發汗過多所致汗為心液心液傷則血虛不能養心故心動悸心液傷則血不能榮脈故脈結代取地黃阿膠等為有形之品補有形之血另立法門
